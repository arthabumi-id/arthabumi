<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;-webkit-text-size-adjust:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
*{-webkit-tap-highlight-color:transparent}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:inherit;font-size:16px;background:#fff}
button{-webkit-appearance:none;font-family:inherit}
#spl{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .3s}
#spl.out{opacity:0;pointer-events:none}
.spl-logo{color:#10b981;font-size:2rem;font-weight:800;letter-spacing:-1px}
.spl-sub{color:#475569;font-size:.8rem}
.spin{width:28px;height:28px;border:3px solid #1e293b;border-top-color:#10b981;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#hdr{background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;height:calc(48px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px)}
.hdr-logo{font-weight:800;font-size:16px;color:#10b981}
.hdr-sync{font-size:11px;margin-top:1px}
.hdr-acts{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.1);border:none;color:#cbd5e1;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 20px}
#nav{background:#0f172a;display:flex;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);padding-bottom:env(safe-area-inset-bottom,0px)}
#nav .nav-btn{flex:1}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:9px 4px;min-width:0;flex-shrink:0;border:none;background:none;cursor:pointer;color:#64748b}
.nav-btn.on{color:#10b981}
.nav-dot{width:4px;height:4px;background:#10b981;border-radius:50%;margin-top:1px}
#toast{position:fixed;bottom:85px;left:12px;right:12px;z-index:800;padding:11px 15px;border-radius:13px;color:#fff;font-size:13px;font-weight:500;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.25);display:none;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.t-ok{background:#10b981}.t-err{background:#ef4444}.t-info{background:#3b82f6}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:14px;padding-top:56px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:480px;padding:18px;position:relative;margin-bottom:20px}
.modal-x{position:absolute;top:14px;right:14px;background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer;color:#64748b}
.modal-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:14px;padding-right:28px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f1f5f9;padding:13px;margin-bottom:9px}
.sub-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:11px;margin-bottom:8px}
.sec-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:11px}
.row{display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.item-name{font-weight:600;font-size:13.5px;color:#1e293b}
.item-sub{font-size:11px;color:#94a3b8;margin-top:1px}
.chip{background:#f8fafc;border-radius:9px;padding:7px 9px}
.chip-lbl{font-size:10px;color:#94a3b8;margin-bottom:1px}
.chip-val{font-size:12px;font-weight:700;color:#1e293b}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
.act-row{display:flex;gap:8px;margin-top:8px}
.fg{margin-bottom:11px}
.fl{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px}
.req{color:#ef4444;margin-left:2px}
.fc{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:15px;color:#1e293b;outline:none;transition:border-color .15s}
.fc:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:#10b981;color:#fff}
.btn-d{background:#ef4444;color:#fff}
.btn-g{background:#f1f5f9;color:#475569}
.btn-o{background:#fff;color:#10b981;border:1.5px solid #10b981}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px}
.btn-w{width:100%}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bdg-blue{background:#dbeafe;color:#1d4ed8}
.bdg-green{background:#dcfce7;color:#15803d}
.bdg-yellow{background:#fef9c3;color:#854d0e}
.bdg-red{background:#fee2e2;color:#b91c1c}
.bdg-gray{background:#f1f5f9;color:#475569}
.bdg-orange{background:#fed7aa;color:#c2410c}
.bdg-purple{background:#ede9fe;color:#7c3aed}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.kpi{background:#fff;border-radius:13px;padding:11px 13px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.kpi-lbl{font-size:9.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kpi-val{font-size:13px;font-weight:700;color:#1e293b;word-break:break-word}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
.tab-on{background:#10b981;color:#fff}
.tab-off{background:#f1f5f9;color:#64748b}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:11px;padding:11px;font-size:11.5px;color:#1d4ed8;line-height:1.5;margin-bottom:11px}
.info-box ol{padding-left:15px;margin-top:5px}
.prog-bar{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:99px;transition:width .3s}
.num-hint{font-size:10px;color:#94a3b8;margin-top:3px}
/* ── Print Area (hidden on screen) ─────────────────────────────────── */
#print-area{display:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1e293b;font-size:12px;line-height:1.5}
.pr-header{text-align:center;border-bottom:2px solid #1e293b;padding-bottom:12px;margin-bottom:16px}
.pr-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.pr-sub{font-size:13px;color:#475569;margin-top:3px}
.pr-date{font-size:10px;color:#94a3b8;margin-top:3px}
.pr-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.pr-kpi-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 11px}
.pr-kpi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:2px}
.pr-kpi-val{font-size:13px;font-weight:700}
.pr-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748b;border-bottom:1px solid #e2e8f0;padding-bottom:4px;margin-bottom:8px}
.pr-table{width:100%;border-collapse:collapse;font-size:11px}
.pr-table th{background:#f1f5f9;padding:5px 8px;text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;border:1px solid #e2e8f0;font-weight:700}
.pr-table td{padding:4px 8px;border:1px solid #e2e8f0;vertical-align:top}
.pr-table tfoot td{background:#f8fafc;font-size:11px}
.pr-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pr-info-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.pr-info-table td{padding:5px 9px;border:1px solid #e2e8f0}
.pr-info-lbl{background:#f8fafc;font-weight:600;font-size:10px;color:#475569;width:130px}
.pr-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media print{
  #spl,#app,#toast,#overlay{display:none!important}
  #print-area{display:block!important;padding:0}
  html,body{height:auto!important;overflow:auto!important;background:#fff!important}
  @page{margin:15mm}
}
</style>
</head>
<body>
<div id="spl">
  <div class="spl-logo" id="spl-name">Arthabumi</div>
  <div class="spin"></div>
  <div class="spl-sub">Memuat aplikasi…</div>
</div>
<div id="app">
  <div id="hdr">
    <div>
      <div class="hdr-logo" id="hdr-name">Arthabumi</div>
      <div class="hdr-sync" id="sync-badge">⚪ Lokal</div>
    </div>
    <div class="hdr-acts">
      <span id="retry-badge" style="display:none;font-size:11px;color:#fdba74;background:rgba(251,146,60,.15);padding:4px 8px;border-radius:7px"></span>
      <button class="hdr-btn" id="btn-sync" style="display:none;background:rgba(16,185,129,.25);color:#6ee7b7" onclick="manualSync()">↻ GSheet</button>
      <button class="hdr-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav"></nav>
</div>
<div id="toast"></div>
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>
<script>
'use strict';
// ARTHABUMI v1.11 - Cashflow per Project + Single Shop Name + Confirmation Modal + Date Filter
const S={
  page:'dashboard',tab:{},navLain:false,formBeliProj:'',formBeliTgl:'',
  projects:[],pembelian:[],karyawan:[],
  logAbsensi:[],logKasbon:[],logPembayaran:[],
  masterBarang:[],masterToko:[],
  rab:[],masterSubkon:[],logSubkon:[],riwayatBayarSubkon:{},
  webAppUrl:'',pollInterval:60,
  syncing:false,lastSync:null,syncError:null,
  countdown:0,retryQ:[],
  formItems:[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:0,diskon:0,status:'HABIS',toko:''}],
  editBeliIdx:null,editBeliOrig:null,
  payItems:[{kodeProj:'',nominal:0,metode:'Transfer',bank:'',ket:'',ref:''}],
  absRows:[],
  rabKodeProj:'',rabNominal:{material:0,upah:0,subkon:0,overhead:0},
  rabLabels:{mat:'',upah:'',subkon:'',overhead:''},
  dashFilter:'Berjalan',
  beliFilter:'',beliTokoFilter:'',beliLogQ:'',absFilter:'',beliSearchQ:'',catatanKode:'',
  companyName:'Arthabumi',companyTagline:'Manajemen Proyek Kontraktor',
};
const KS={p:'ab3-p',beli:'ab3-beli',kr:'ab3-kr',abs:'ab3-abs',ksb:'ab3-ksb',bayar:'ab3-bayar',brg:'ab3-brg',toko:'ab3-toko',url:'ab3-url',poll:'ab3-poll',rab:'ab3-rab',sk:'ab3-sk',lsk:'ab3-lsk',co:'ab3-co',rbsk:'ab3-rbsk'};
const sg=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
function loadLocal(){
  S.projects=sg(KS.p,[]);S.pembelian=sg(KS.beli,[]);S.karyawan=sg(KS.kr,[]);
  S.logAbsensi=sg(KS.abs,[]);S.logKasbon=sg(KS.ksb,[]);S.logPembayaran=sg(KS.bayar,[]);
  S.masterBarang=sg(KS.brg,[]);S.masterToko=sg(KS.toko,[]);
  S.rab=sg(KS.rab,[]);S.masterSubkon=sg(KS.sk,[]);S.logSubkon=sg(KS.lsk,[]);S.riwayatBayarSubkon=sg(KS.rbsk,{});
  const co=sg(KS.co,null);
  if(co){S.companyName=co.name||'Arthabumi';S.companyTagline=co.tagline||'';}
}
// ── Utilities
const fRp=v=>'Rp '+(Number(v)||0).toLocaleString('id-ID');
const fDate=d=>{if(!d)return'-';try{
  if(typeof d==='string'&&d.match(/^\d{4}-\d{2}-\d{2}$/)){const[y,m,dy]=d.split('-').map(Number);return new Date(y,m-1,dy).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});}
  return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}catch{return d;}};
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const calcTotal=it=>{const b=(Number(it.qty)||0)*(Number(it.harga)||0),d=Number(it.diskon)||0;return it.status==='ASET'?0:Math.max(0,b-d);};
const padId=(pfx,arr,key='id')=>pfx+'-'+String(Math.max(0,...arr.map(x=>parseInt((x[key]||'0').split('-').pop())||0))+1).padStart(3,'0');
const bdgClass=s=>({Berjalan:'bdg-blue',Selesai:'bdg-green',Hold:'bdg-yellow',Batal:'bdg-red',Hadir:'bdg-green','Tidak Hadir':'bdg-red','Setengah Hari':'bdg-yellow',Libur:'bdg-gray',AMBIL:'bdg-orange',POTONG:'bdg-purple',BONUS:'bdg-yellow','Belum Dibayar':'bdg-red','Sudah Dibayar':'bdg-green',DP:'bdg-orange',Lunas:'bdg-green'}[s]||'bdg-gray');
const bdg=(s,extra='')=>`<span class="bdg ${bdgClass(s)} ${extra}">${esc(s)}</span>`;
function showToast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`t-${type}`;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',type==='err'?6000:type==='info'?2000:4000);}
// ── [v1.8] Format angka ribuan Indonesia (titik pemisah ribuan)
function applyNiFmt(el){
  let r=el.value.replace(/[^0-9]/g,'');
  el.dataset.raw=r||'0';
  el.value=r?parseInt(r).toLocaleString('id-ID'):'';
}
function getNum(id){
  const el=document.getElementById(id);if(!el)return 0;
  return parseInt((el.dataset.raw||el.value||'0').replace(/[^0-9]/g,'')||'0')||0;
}
const parseNum=v=>parseInt(String(v||'').replace(/\./g,'').replace(/[^0-9]/g,''),10)||0;
const numInp=(id,val=0,ph='0',extra='')=>{
  const fv=val&&val!=0?Number(val).toLocaleString('id-ID'):'';
  return `<input class="fc" id="${id}" type="text" inputmode="numeric" value="${fv}" placeholder="${ph}" data-raw="${val||0}" oninput="applyNiFmt(this)" ${extra}>`;
};
// ── GSheet API
async function gsFetch(url){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),30000); // 30 detik — GAS cold start bisa 20-25 detik
  try{
    const r=await fetch(url+'?action=getAllData&t='+Date.now(),{redirect:'follow',cache:'no-cache',signal:ctrl.signal});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();if(!j.ok)throw new Error(j.error||'GSheet error');return j.data;
  }finally{clearTimeout(tid);}
}
async function gsWrite(url,action,data){
  const ps=JSON.stringify(data);
  if(ps.length>50000)throw new Error('Data terlalu besar (>50KB)');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),45000); // 45 detik — GAS bisa cold-start lama
  try{
    const r=await fetch(url+'?action='+action+'&payload='+encodeURIComponent(ps)+'&t='+Date.now(),{redirect:'follow',cache:'no-cache',signal:ctrl.signal});
    if(!r.ok)throw new Error('HTTP '+r.status);
    let j;try{j=await r.json();}catch{throw new Error('Response bukan JSON');}
    if(!j.ok)throw new Error(j.error||'Apps Script error');return j.data;
  }finally{clearTimeout(tid);}
}

function applyGS(d){
  if(!d)return;
  if(d.projects){S.projects=d.projects;ss(KS.p,d.projects);}
  if(d.pembelian){S.pembelian=d.pembelian;ss(KS.beli,d.pembelian);}
  if(d.karyawan){S.karyawan=d.karyawan;ss(KS.kr,d.karyawan);}
  if(d.logAbsensi){S.logAbsensi=d.logAbsensi;ss(KS.abs,d.logAbsensi);}
  if(d.logKasbon){S.logKasbon=d.logKasbon;ss(KS.ksb,d.logKasbon);}
  if(d.logPembayaran){S.logPembayaran=d.logPembayaran;ss(KS.bayar,d.logPembayaran);}
  if(d.barang){S.masterBarang=d.barang;ss(KS.brg,d.barang);}
  if(d.toko){S.masterToko=d.toko;ss(KS.toko,d.toko);}
  if(d.rab){S.rab=d.rab;ss(KS.rab,d.rab);}
  if(d.subkon){S.masterSubkon=d.subkon;ss(KS.sk,d.subkon);}
  if(d.logSubkon){S.logSubkon=d.logSubkon;ss(KS.lsk,d.logSubkon);}
  S.lastSync=new Date();S.syncError=null;updateSyncBadge();
}
async function doFetch(url){
  const u=url||S.webAppUrl;if(!u)return;S.syncing=true;updateSyncBadge();
  try{const d=await gsFetch(u);applyGS(d);}
  catch(e){
    const msg=e.name==='AbortError'?'GSheet lambat/timeout — data lokal dipakai':('GSheet: '+e.message);
    S.syncError=msg;showToast('⚠️ '+msg,'err');
  }
  finally{S.syncing=false;updateSyncBadge();}
}
async function doSync(action,payload){
  if(!S.webAppUrl)return;S.syncing=true;S.syncError=null;updateSyncBadge();
  showToast('🔄 Menyimpan ke GSheet…','info');
  try{const d=await gsWrite(S.webAppUrl,action,payload);applyGS(d);showToast('✅ GSheet berhasil diupdate!');go(S.page);}
  catch(e){
    const msg=e.name==='AbortError'?'GSheet timeout — data disimpan lokal, retry otomatis':e.message;
    S.syncError=msg;S.retryQ.push({action,payload,retries:0});showToast('⚠️ '+msg,'err');
  }
  finally{S.syncing=false;updateSyncBadge();}
}
function updateSyncBadge(){
  const el=document.getElementById('sync-badge');if(!el)return;
  if(!S.webAppUrl){el.textContent='⚪ Lokal';el.style.color='#64748b';}
  else if(S.syncing){el.textContent='🔄 Sync…';el.style.color='#60a5fa';}
  else if(S.syncError){el.textContent='⚠️ Gagal';el.style.color='#f87171';}
  else if(S.lastSync){el.textContent='✅ '+S.lastSync.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})+(S.countdown>0?' ·'+S.countdown+'d':'');el.style.color='#34d399';}
  else{el.textContent='⚡ GSheet';el.style.color='#fbbf24';}
  const rb=document.getElementById('retry-badge');if(rb){rb.style.display=S.retryQ.length>0?'inline':'none';rb.textContent='⏳'+S.retryQ.length;}
  const sb=document.getElementById('btn-sync');if(sb)sb.style.display=S.webAppUrl?'block':'none';
}
function manualSync(){S.countdown=S.pollInterval;doFetch();}
let countdownTimer=null;
function startPoll(){
  if(countdownTimer)clearInterval(countdownTimer);
  if(!S.webAppUrl||!S.pollInterval||S.pollInterval<=0)return;
  S.countdown=S.pollInterval;
  countdownTimer=setInterval(()=>{S.countdown--;updateSyncBadge();if(S.countdown<=0){S.countdown=S.pollInterval;if(!S.syncing)doFetch();}},1000);
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&S.webAppUrl&&!S.syncing){
    const gap=S.lastSync?(Date.now()-S.lastSync.getTime()):Infinity;
    if(gap>30000)doFetch();

});
setInterval(async()=>{
  if(!S.webAppUrl||S.retryQ.length===0||S.syncing)return;
  const item=S.retryQ[0];if(!item)return;
  if(item.retries>=3){S.retryQ.shift();showToast('❌ Retry gagal 3x','err');return;}
  S.syncing=true;
  try{const d=await gsWrite(S.webAppUrl,item.action,item.payload);applyGS(d);S.retryQ.shift();showToast('✅ Retry OK');}
  catch{item.retries++;}
  finally{S.syncing=false;updateSyncBadge();}
},30000);

// ── FEATURE 4: Date Filter [v1.11]
const filterByDate=(items,mode,fromDate,toDate)=>{
  if(!mode||mode==='all')return items;
  const today_str=today();
  const t=new Date(today_str);
  let from,to;
  if(mode==='today'){from=to=today_str;}
  else if(mode==='yesterday'){const y=new Date(t);y.setDate(y.getDate()-1);const ys=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');from=to=ys;}
  else if(mode==='thisweek'){
    const day=t.getDay();const diff=t.getDate()-day+(day===0?-6:1);
    const start=new Date(t.setDate(diff));from=start.getFullYear()+'-'+String(start.getMonth()+1).padStart(2,'0')+'-'+String(start.getDate()).padStart(2,'0');
    to=today_str;
  }
  else if(mode==='thismonth'){
    from=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-01';
    to=today_str;
  }
  else if(mode==='custom'){
    from=fromDate;to=toDate;
  }
  if(!from||!to)return items;
  return items.filter(x=>{const d=(x.tgl||'').substring(0,10);return d>=from&&d<=to;});
};
// ── FEATURE 1: Cashflow Calculation [v1.11]
// Helper: hitung semua komponen kasbon untuk satu proyek
// - ambil  = total kasbon AMBIL yang tercatat untuk proyek ini
// calcKasbonForProj v2 — model baru:
// - POTONG: user secara eksplisit pilih proyek mana yang menanggung kasbon ini
// - BONUS : bonus karyawan untuk proyek ini
// - Hutang karyawan (global) dipisah di getWorkerKasbonDetail
const calcKasbonForProj=(kode)=>{
  const potong=S.logKasbon.filter(x=>x.kodeProj===kode&&x.tipe==='POTONG')
    .reduce((s,x)=>s+(Number(x.nominal)||0),0);
  const bonus=S.logKasbon.filter(x=>x.kodeProj===kode&&x.tipe==='BONUS')
    .reduce((s,x)=>s+(Number(x.nominal)||0),0);
  return{potong,bonus};
};
// Helper: kasbon per-worker, breakdown per proyek
// Returns {byProj:[{kodeProj,projNama,ambil}], totalAmbil, totalPotong, hutang}
const getWorkerKasbonDetail=(idKaryawan)=>{
  const projMap={};
  S.logKasbon.filter(x=>x.idKaryawan===idKaryawan&&x.tipe==='AMBIL').forEach(x=>{
    const kp=x.kodeProj||'__global__';
    projMap[kp]=(projMap[kp]||0)+(Number(x.nominal)||0);
  });
  const totalAmbil=Object.values(projMap).reduce((s,v)=>s+v,0);
  const totalPotong=S.logKasbon.filter(x=>x.idKaryawan===idKaryawan&&x.tipe==='POTONG').reduce((s,x)=>s+(Number(x.nominal)||0),0);
  const hutang=Math.max(0,totalAmbil-totalPotong);
  const byProj=Object.entries(projMap).map(([kodeProj,ambil])=>({
    kodeProj,
    projNama:kodeProj==='__global__'?'Tidak terkait proyek':S.projects.find(p=>p.kode===kodeProj)?.nama||kodeProj,
    ambil
  })).sort((a,b)=>b.ambil-a.ambil);
  return{byProj,totalAmbil,totalPotong,hutang};
};
const calcCashflow=(kodeProj)=>{
  const pembayaran=S.logPembayaran.filter(x=>x.kodeProj===kodeProj).reduce((s,x)=>s+(Number(x.nominal)||0),0);
  const pembelian=S.pembelian.filter(b=>b.kodeProj===kodeProj&&b.status!=='ASET').reduce((s,b)=>s+calcTotal(b),0);
  const upah=S.logAbsensi.filter(a=>a.kodeProj===kodeProj).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const subkon=S.logSubkon.filter(ls=>ls.kodeProj===kodeProj).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
  const kb=calcKasbonForProj(kodeProj);
  // biaya = upah_gross + mat + subkon + bonus
  // (net_upah + kasbon_jadi_biaya = gross, potong cancel)
  return pembayaran-(pembelian+upah+subkon+kb.bonus);
};
function pgDashboard(){
  const view=S.tab.dashboard||'rekap';
  const tabBar=`<div class="tabs" style="margin-bottom:12px">

  if(view==='piutang')return `<div class="sec-title">${esc(S.companyName)}</div>${tabBar}${pgPiutang()}`;
  if(view==='hutang')return `<div class="sec-title">${esc(S.companyName)}</div>${tabBar}${pgHutang()}`;

  const filtered=S.dashFilter==='Semua'?S.projects:S.projects.filter(p=>p.status===S.dashFilter);

function pgPiutang(){
  const projs=S.projects
    .map(p=>{
      const bayar=S.logPembayaran.filter(x=>x.kodeProj===p.kode).reduce((s,x)=>s+(Number(x.nominal)||0),0);
      const nk=vSum(p).final;
      const piutang=nk-bayar;
      return{...p,bayar,piutang,nk};
    })
    .filter(p=>p.piutang>0)
    .sort((a,b)=>b.piutang-a.piutang);

  if(!projs.length)return`<div style="text-align:center;padding:50px 20px">
    <div style="font-size:36px;margin-bottom:8px">🎉</div>
    <div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:4px">Tidak ada piutang!</div>

  const totalPiutang=projs.reduce((s,p)=>s+p.piutang,0);
  const totalKontrak=projs.reduce((s,p)=>s+(Number(p.nk)||0),0);
  const totalBayar=projs.reduce((s,p)=>s+p.bayar,0);

  const cards=projs.map(p=>{
    const pct=p.nk>0?Math.round(p.bayar/p.nk*100):0;
    const isHigh=p.piutang>=(Number(p.nk)||0)*0.5;
    return `<div class="card" style="border-left:3px solid ${isHigh?'#ef4444':'#f97316'}">
      <div class="row" style="margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div class="item-name">${esc(p.nama)}</div>
          <div class="item-sub">${esc(p.jenis)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          ${bdg(p.status)}
          <button class="btn btn-o btn-sm" style="font-size:11px;padding:5px 10px" onclick="openRekapProyek('${esc(p.kode)}')">📋</button>
        </div>
      </div>
      <div class="g3">
        <div class="chip"><div class="chip-lbl">Kontrak</div><div class="chip-val">${fRp(p.nk)}</div></div>
        <div class="chip" style="background:#f0fdf4"><div class="chip-lbl">Sudah Bayar (${pct}%)</div><div class="chip-val" style="color:#16a34a">${fRp(p.bayar)}</div></div>
        <div class="chip" style="background:#fff7ed"><div class="chip-lbl">Sisa Tagih</div><div class="chip-val" style="color:#dc2626;font-size:13px">${fRp(p.piutang)}</div></div>
      </div>
      <div style="margin-top:8px">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:#10b981"></div></div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px">${pct}% terbayar</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="kpi-grid" style="margin-bottom:12px">
    <div class="kpi" style="background:#fff7ed;border:1px solid #fed7aa"><div class="kpi-lbl">Total Piutang</div><div class="kpi-val" style="color:#dc2626">${fRp(totalPiutang)}</div></div>
    <div class="kpi"><div class="kpi-lbl">${projs.length} proyek belum lunas</div><div class="kpi-val" style="font-size:13px;color:#64748b">${fRp(totalBayar)} / ${fRp(totalKontrak)}</div></div>
  </div>${cards}`;
}

// Hitung total kerja tambah/kurang & nilai final proyek
function vSum(p){
  const v=(p&&p.variasi)||[];let t=0,k=0;
  v.forEach(x=>{const n=Number(x.nominal)||0;if(x.jenis==='kurang')k+=n;else t+=n;});
  return{tambah:t,kurang:k,n:v.length,final:(Number(p.nilaiKontrak)||0)+t-k};
}
function _projPayload(p){return{kode:p.kode,nama:p.nama,jenis:p.jenis,status:p.status,nilaiKontrak:p.nilaiKontrak,tglMulai:p.tglMulai||'',catatan:p.catatan||'',progress:p.progress||0,variasi:p.variasi||[]};}
function saveProject(isEdit){
  const kode=document.getElementById('p-kode').value.trim();
  const nama=document.getElementById('p-nama').value.trim();
  const kontrak=getNum('p-kontrak');
  const progress=Math.min(100,Math.max(0,parseInt(document.getElementById('p-progress').value)||0));
  if(!kode||!nama||!kontrak){showToast('Lengkapi field wajib','err');return;}
  const _ei=isEdit?Number(document.getElementById('p-idx').value):-1;
  const existingCatatan=isEdit?(S.projects[_ei]?.catatan||''):'';
  const existingVariasi=isEdit?(S.projects[_ei]?.variasi||[]):[];
  const d={kode,nama,jenis:document.getElementById('p-jenis').value,status:document.getElementById('p-sts').value,nilaiKontrak:kontrak,tglMulai:document.getElementById('p-tgl').value,catatan:existingCatatan,progress,variasi:existingVariasi};
  if(isEdit){const i=Number(document.getElementById('p-idx').value);S.projects[i]=d;}else S.projects.push(d);
  ss(KS.p,S.projects);closeModal();go('project');
  showToast(isEdit?'✅ Proyek diperbarui':'✅ Proyek ditambahkan');
  doSync(isEdit?'updateProject':'addProject',d);
}
function delProject(kode){
  const nama=S.projects.find(p=>p.kode===kode)?.nama||kode;
  if(!confirm('Hapus proyek "'+nama+'"?'))return;
  S.projects=S.projects.filter(p=>p.kode!==kode);ss(KS.p,S.projects);go('project');
  showToast('🗑 Dihapus');doSync('deleteProject',{kode});
}

function pgHutang(){
  // ── 1. Hutang Upah per Proyek ────────────────────────────────────────
  const upahByProj={};
  S.logAbsensi.filter(a=>a.statusBayar==='Belum Dibayar').forEach(a=>{
    if(!upahByProj[a.kodeProj])upahByProj[a.kodeProj]={karyawan:{},total:0};
    if(!upahByProj[a.kodeProj].karyawan[a.idKaryawan])
      upahByProj[a.kodeProj].karyawan[a.idKaryawan]={nama:a.nama||a.idKaryawan,total:0,hari:0};
    upahByProj[a.kodeProj].karyawan[a.idKaryawan].total+=(Number(a.upahHariIni)||0);
    upahByProj[a.kodeProj].karyawan[a.idKaryawan].hari++;
    upahByProj[a.kodeProj].total+=(Number(a.upahHariIni)||0);
  });
  const totalHutangUpah=Object.values(upahByProj).reduce((s,x)=>s+x.total,0);

  // ── 2. Hutang Subkon ─────────────────────────────────────────────────
  const subkonBelum=S.logSubkon.filter(ls=>ls.statusBayar==='Belum Dibayar');
  const totalHutangSubkon=subkonBelum.reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0)-(Number(ls.nominalBayar)||0),0);

  const grandTotal=totalHutangUpah+totalHutangSubkon;

  if(grandTotal===0&&subkonBelum.length===0&&totalHutangUpah===0)
    return`<div style="text-align:center;padding:50px 20px">
      <div style="font-size:36px;margin-bottom:8px">✅</div>
      <div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:4px">Tidak ada hutang!</div>
      <div style="font-size:13px;color:#94a3b8">Semua upah dan subkon sudah dibayar.</div></div>`;

  // KPI
  const kpi=`<div class="kpi-grid" style="margin-bottom:14px">
    <div class="kpi" style="background:#fff1f2;border:1px solid #fecaca"><div class="kpi-lbl">Total Hutang</div><div class="kpi-val" style="color:#dc2626">${fRp(grandTotal)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Hutang Upah</div><div class="kpi-val" style="color:#ea580c">${fRp(totalHutangUpah)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Hutang Subkon</div><div class="kpi-val" style="color:#7c3aed">${fRp(totalHutangSubkon)}</div></div>
    <div class="kpi"><div class="kpi-lbl">${Object.keys(upahByProj).length} proyek · ${subkonBelum.length} subkon</div><div class="kpi-val" style="font-size:11px;color:#94a3b8">belum lunas</div></div>
  </div>`;

  // Bagian Upah
  let upahSection='';
  if(totalHutangUpah>0){
    const projCards=Object.entries(upahByProj)
      .sort((a,b)=>b[1].total-a[1].total)
      .map(([kodeProj,data])=>{
        const proj=S.projects.find(p=>p.kode===kodeProj);
        const namaProj=proj?proj.nama:kodeProj;
        const krList=Object.values(data.karyawan).sort((a,b)=>b.total-a.total);
        return`<div class="card" style="border-left:3px solid #f97316;margin-bottom:8px">
          <div class="row" style="margin-bottom:8px">
            <div><div class="item-name">${esc(namaProj)}</div><div class="item-sub">${esc(kodeProj)}</div></div>
            <div style="text-align:right">
              <div style="font-size:15px;font-weight:800;color:#ea580c">${fRp(data.total)}</div>
              <button class="btn btn-o btn-sm" style="font-size:10px;padding:3px 8px;margin-top:3px" onclick="go('closing')">Bayar →</button>
            </div>
          </div>
          <div style="background:#fff7ed;border-radius:8px;padding:8px 10px">
            ${krList.map(kr=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #fed7aa;font-size:12px">
              <span style="color:#92400e">${esc(kr.nama)} <span style="color:#b45309;font-size:11px">${kr.hari} hari</span></span>
              <span style="font-weight:700;color:#c2410c">${fRp(kr.total)}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('');
    upahSection=`<div style="font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin-bottom:8px">👷 HUTANG UPAH KARYAWAN</div>${projCards}`;
  }

  // Bagian Subkon
  let subkonSection='';
  if(subkonBelum.length>0){
    const subCards=subkonBelum
      .sort((a,b)=>((Number(b.nilaiKontrak)||0)-(Number(b.nominalBayar)||0))-((Number(a.nilaiKontrak)||0)-(Number(a.nominalBayar)||0)))
      .map(ls=>{
        const sisa=(Number(ls.nilaiKontrak)||0)-(Number(ls.nominalBayar)||0);
        const proj=S.projects.find(p=>p.kode===ls.kodeProj);
        return`<div class="card" style="border-left:3px solid #7c3aed;margin-bottom:8px">
          <div class="row">
            <div style="flex:1;min-width:0">
              <div class="item-name">${esc(ls.namaSubkon||ls.idSubkon)}</div>
              <div class="item-sub">${esc(proj?proj.nama:ls.kodeProj)} · ${esc(ls.uraian||'')}</div>
            </div>
            <div style="text-align:right;margin-left:10px;flex-shrink:0">
              <div style="font-size:14px;font-weight:800;color:#7c3aed">${fRp(sisa)}</div>
              <div style="font-size:10px;color:#94a3b8">sisa dari ${fRp(ls.nilaiKontrak)}</div>
            </div>
          </div>
        </div>`;
      }).join('');
    subkonSection=`<div style="font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin:12px 0 8px">🔨 HUTANG SUBKONTRAKTOR</div>${subCards}`;
  }

  return kpi+upahSection+subkonSection;
}
// ── REKAP PROYEK ──────────────────────────────────────────────────────
function openRekapProyek(kode){
  const p=S.projects.find(x=>x.kode===kode);
  if(!p)return;
  // Biaya
  const matBiaya=S.pembelian.filter(b=>b.kodeProj===kode&&b.status!=='ASET').reduce((s,b)=>s+calcTotal(b),0);
  const upahTotal=S.logAbsensi.filter(a=>a.kodeProj===kode).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const upahSudah=S.logAbsensi.filter(a=>a.kodeProj===kode&&a.statusBayar==='Sudah Dibayar').reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const upahBelum=S.logAbsensi.filter(a=>a.kodeProj===kode&&a.statusBayar==='Belum Dibayar').reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const subkonBiaya=S.logSubkon.filter(ls=>ls.kodeProj===kode).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
  const kb=calcKasbonForProj(kode);
  const upahNet=upahTotal-kb.potong; // cash dibayar ke tukang
  // biaya = upah_gross + mat + subkon + bonus
  // (net_upah + kasbon_jadi_biaya = gross; potong cancel)
  const totalBiaya=matBiaya+upahTotal+subkonBiaya+kb.bonus;
  // Pembayaran klien
  const bayarRows=S.logPembayaran.filter(x=>x.kodeProj===kode).sort((a,b)=>b.tgl.localeCompare(a.tgl));
  const bayarTotal=bayarRows.reduce((s,x)=>s+(Number(x.nominal)||0),0);
  const vs=vSum(p);const nilaiFinal=vs.final;
  const piutang=nilaiFinal-bayarTotal;
  const laba=nilaiFinal-totalBiaya;
  const margin=nilaiFinal>0?(laba/nilaiFinal*100):0;
  // RAB
  const rab=S.rab.find(r=>r.kodeProj===kode);
  const rabT=rab?(rab.material||0)+(rab.upah||0)+(rab.subkon||0)+(rab.overhead||0):0;
  const pctRAB=rabT>0?Math.min(100,Math.round(totalBiaya/rabT*100)):0;
  // Upah belum bayar per karyawan
  const upahMap={};
  S.logAbsensi.filter(a=>a.kodeProj===kode&&a.statusBayar==='Belum Dibayar').forEach(a=>{
    if(!upahMap[a.idKaryawan])upahMap[a.idKaryawan]={nama:a.nama||a.idKaryawan,total:0,hari:0};
    upahMap[a.idKaryawan].total+=(Number(a.upahHariIni)||0);
    upahMap[a.idKaryawan].hari++;
  });
  const upahBelumList=Object.values(upahMap).sort((a,b)=>b.total-a.total);

  const row2=(lbl,val,style='')=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#475569">${lbl}</span><span style="font-weight:700;${style}">${fRp(val)}</span></div>`;

  openModal(`<div class="modal-title">📋 ${esc(p.nama)}</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:${p.catatan?'8px':'14px'};display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span>${esc(p.kode)}</span><span>·</span><span>${esc(p.jenis)}</span>${p.tglMulai?`<span>·</span><span>Mulai ${fDate(p.tglMulai)}</span>`:''}
      <span style="margin-left:2px">${bdg(p.status)}</span>
    </div>
    ${p.catatan?`<div style="margin-bottom:14px;padding:10px 12px;background:#fefce8;border-radius:10px;border-left:3px solid #eab308;font-size:12.5px;color:#713f12;white-space:pre-line;line-height:1.6">📝 ${esc(p.catatan)}</div>`:''}

    ${p.progress>0?`<div style="margin-bottom:12px">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">📊 Progress Pekerjaan: ${p.progress}%</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p.progress}%;background:${p.progress>=75?'#10b981':p.progress>=50?'#f59e0b':'#ef4444'}"></div></div>
    </div>`:''}
    <div class="g2" style="margin-bottom:12px">
      <div class="chip" style="background:#eff6ff"><div class="chip-lbl">Nilai Kontrak${vs.n>0?' (Final)':''}</div><div class="chip-val" style="color:#1d4ed8">${fRp(nilaiFinal)}</div>${vs.n>0?`<div style="font-size:10px;color:#64748b;margin-top:2px">Awal ${fRp(p.nilaiKontrak)}${vs.tambah>0?` · ▲${fRp(vs.tambah)}`:''}${vs.kurang>0?` · ▼${fRp(vs.kurang)}`:''}</div>`:''}</div>
      <div class="chip" style="${piutang>0?'background:#fff7ed':'background:#f0fdf4'}"><div class="chip-lbl">Piutang Klien</div><div class="chip-val" style="color:${piutang>0?'#dc2626':'#16a34a'}">${piutang>0?fRp(piutang):'Lunas ✓'}</div></div>
      <div class="chip" style="background:#fef2f2"><div class="chip-lbl">Total Biaya</div><div class="chip-val" style="color:#dc2626">${fRp(totalBiaya)}</div></div>
      <div class="chip" style="${laba>=0?'background:#f0fdf4':'background:#fff1f2'}"><div class="chip-lbl">Est. Laba (${margin.toFixed(1)}%)</div><div class="chip-val" style="color:${laba>=0?'#16a34a':'#dc2626'}">${fRp(laba)}</div></div>
    </div>
    ${upahBelum>0&&upahBelum>=(Number(p.nilaiKontrak)||0)*0.1?`<div style="background:#fef9c3;border:1px solid #fef08a;border-radius:11px;padding:10px;margin-bottom:12px;font-size:12px;color:#854d0e">⚠️ <strong>Upah menumpuk</strong> – ${fRp(upahBelum)} belum dibayar. Segera lakukan pembayaran.</div>`:''}
    ${rabT>0&&totalBiaya>rabT*0.9?`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:11px;padding:10px;margin-bottom:12px;font-size:12px;color:#b91c1c">⚠️ <strong>Biaya mendekati RAB</strong> – Sudah ${Math.round(totalBiaya/rabT*100)}% dari RAB ${fRp(rabT)}. Perhatikan pengeluaran selanjutnya.</div>`:''}


    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px">🔧 KERJA TAMBAH / KURANG</div>
      <button class="btn btn-o btn-sm" style="font-size:11px;padding:4px 9px" onclick="openVariasiForm('${esc(p.kode)}')">+ Tambah</button>
    </div>
    ${(p.variasi&&p.variasi.length)?`<div style="background:#f8fafc;border-radius:10px;padding:8px 10px;margin-bottom:12px">
      ${p.variasi.map((v,vi)=>`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #eef2f7">
        <div style="flex:1;min-width:0">
          <div style="font-size:12.5px;font-weight:600">${v.jenis==='kurang'?'<span style="color:#dc2626">▼ Kurang</span>':'<span style="color:#16a34a">▲ Tambah</span>'} · ${fRp(v.nominal)}</div>
          <div style="font-size:11.5px;color:#64748b;white-space:pre-line">${fDate(v.tgl)}${v.catatan?' · '+esc(v.catatan):''}</div>
        </div>
        <button style="background:#fee2e2;border:none;border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer;color:#b91c1c;flex-shrink:0" onclick="delVariasi('${esc(p.kode)}',${vi})">🗑</button>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:7px 0 2px;font-size:12.5px;font-weight:800">
        <span style="color:#1e293b">Penyesuaian Bersih</span><span style="color:${nilaiFinal>=(Number(p.nilaiKontrak)||0)?'#16a34a':'#dc2626'}">${nilaiFinal-(Number(p.nilaiKontrak)||0)>=0?'+':''}${fRp(nilaiFinal-(Number(p.nilaiKontrak)||0))}</span></div>
    </div>`:`<div style="font-size:12px;color:#94a3b8;margin-bottom:12px;padding:4px 0">Belum ada catatan. Tekan "+ Tambah" untuk mencatat kerja tambah/kurang.</div>`}

    <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin-bottom:5px">BREAKDOWN BIAYA</div>
    <div style="background:#f8fafc;border-radius:10px;padding:10px 12px;margin-bottom:12px">
      ${row2('🧱 '+(rab&&rab.labelMat?esc(rab.labelMat):'Material'),matBiaya)}
      ${row2('👷 Upah Tenaga (gross)',upahTotal)}
      ${kb.potong>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 4px 10px;border-bottom:1px solid #f1f5f9;font-size:12px"><span style="color:#7c3aed">💼 Dipotong kasbon (cash ke tukang)</span><span style="font-weight:700;color:#7c3aed">− ${fRp(kb.potong)}</span></div>`:''}
      ${kb.potong>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 4px 10px;border-bottom:1px solid #f1f5f9;font-size:12px"><span style="color:#94a3b8">  Net cash ke tukang</span><span style="font-weight:600;color:#64748b">${fRp(upahNet)}</span></div>`:''}
      ${kb.potong>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#c2410c;font-weight:600">💼 Kasbon → biaya proyek ini</span><span style="font-weight:700;color:#c2410c">+ ${fRp(kb.potong)}</span></div>`:''}
      ${row2('🔨 '+(rab&&rab.labelSubkon?esc(rab.labelSubkon):'Subkontraktor'),subkonBiaya)}
      ${kb.bonus>0?row2('🎁 Bonus Karyawan',kb.bonus,'color:#d97706'):''}
      <div style="display:flex;justify-content:space-between;padding:6px 0 2px;font-size:13px;font-weight:800">
        <span style="color:#1e293b">Total</span><span style="color:#dc2626">${fRp(totalBiaya)}</span></div>
    </div>

    <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin-bottom:5px">
      💰 UPAH BELUM DIBAYAR&nbsp;
      ${upahBelum>0?`<span style="color:#dc2626;font-size:12px">${fRp(upahBelum)}</span>`:'<span style="color:#16a34a;font-size:12px">Semua lunas ✓</span>'}
    </div>
    ${upahBelumList.length===0
      ?`<div style="font-size:12px;color:#94a3b8;margin-bottom:12px;padding:8px 0">Tidak ada upah tertunggak di proyek ini.</div>`
      :`<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px 12px;margin-bottom:12px">
        ${upahBelumList.map(kr=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #fed7aa;font-size:12.5px">
          <span style="color:#92400e">${esc(kr.nama)} <span style="color:#b45309;font-size:11px">${kr.hari} hari</span></span>
          <span style="font-weight:700;color:#c2410c">${fRp(kr.total)}</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:6px 0 2px;font-size:13px;font-weight:800">
          <span style="color:#92400e">Dana yang perlu disiapkan</span><span style="color:#dc2626">${fRp(upahBelum)}</span></div>
      </div>`}

    <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin-bottom:5px">PEMBAYARAN KLIEN · ${fRp(bayarTotal)} diterima</div>
    ${bayarRows.length===0
      ?`<div style="font-size:12px;color:#94a3b8;margin-bottom:12px;padding:8px 0">Belum ada pembayaran masuk.</div>`
      :`<div style="background:#f8fafc;border-radius:10px;padding:10px 12px;margin-bottom:12px">
        ${bayarRows.map(x=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #e2e8f0;font-size:12px">
          <span style="color:#475569">${fDate(x.tgl)} · ${esc(x.metode||'')}${x.bank?' · '+esc(x.bank):''}</span>
          <span style="font-weight:700;color:#2563eb">${fRp(x.nominal)}</span></div>`).join('')}
      </div>`}

    ${rabT>0?`<div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.5px;margin-bottom:5px">RAB VS REALISASI · ${pctRAB}%</div>
    <div class="prog-bar" style="margin-bottom:4px"><div class="prog-fill" style="width:${pctRAB}%;background:${totalBiaya>rabT?'#ef4444':'#10b981'}"></div></div>
    <div style="font-size:11px;color:#94a3b8;margin-bottom:12px">${totalBiaya>rabT?'⚠️ Biaya melebihi RAB':'✅ Masih dalam batas RAB'} (RAB ${fRp(rabT)})</div>`:''}

    <div class="act-row" style="gap:8px">
      <button class="btn btn-o" style="flex:1" onclick="const i=S.projects.findIndex(x=>x.kode==='${esc(p.kode)}');closeModal();openEditProject(i)">✏️ Edit Nilai/Info</button>
      <button class="btn btn-g" style="flex:1" onclick="closeModal()">Tutup</button>
    </div>`);
}

  openModal(`<div class="modal-title">🔧 Kerja Tambah / Kurang</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:12px">${esc(p.nama)} · ${esc(p.kode)}</div>

      <select class="fc" id="v-jenis">

        <option value="kurang">▼ Kerja Kurang (nilai berkurang)</option>
      </select></div>
    <div class="fg"><label class="fl">Nominal (Rp)<span class="req">*</span></label>
      ${numInp('v-nominal',0,'5.000.000')}</div>
    <div class="fg"><label class="fl">Tanggal</label><input class="fc" id="v-tgl" type="date" value="${today()}"></div>
    <div class="fg"><label class="fl">Catatan</label>
      <textarea class="fc" id="v-catatan" rows="2" placeholder="mis. tambah kanopi belakang / kurang pasang keramik teras"></textarea></div>
    <div class="act-row" style="justify-content:flex-end">
      <button class="btn btn-g" onclick="openRekapProyek('${esc(kode)}')">Batal</button>
      <button class="btn btn-p" onclick="saveVariasi('${esc(kode)}')">💾 Simpan</button></div>`);
}
function saveVariasi(kode){
  const p=S.projects.find(x=>x.kode===kode);if(!p)return;
  const nominal=getNum('v-nominal');
  if(!nominal){showToast('Isi nominal dulu','err');return;}
  const entry={tgl:document.getElementById('v-tgl').value||today(),jenis:document.getElementById('v-jenis').value,nominal,catatan:document.getElementById('v-catatan').value.trim()};
  if(!Array.isArray(p.variasi))p.variasi=[];
  p.variasi.push(entry);
  ss(KS.p,S.projects);
  showToast('✅ Tersimpan');
  openRekapProyek(kode);
  doSync('updateProject',_projPayload(p));
}
function delVariasi(kode,idx){
  const p=S.projects.find(x=>x.kode===kode);if(!p||!Array.isArray(p.variasi))return;
  if(!confirm('Hapus catatan kerja tambah/kurang ini?'))return;
  p.variasi.splice(idx,1);
  ss(KS.p,S.projects);
  showToast('🗑 Dihapus');
  openRekapProyek(kode);
  doSync('updateProject',_projPayload(p));
}

function beliInput(){
  if(!S.formItems||!S.formItems.length)S.formItems=[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:0,diskon:0,status:'HABIS',toko:''}];

function beliLog(){
  const dateMode=S.tab.beliDateMode||'all';
  const fromD=S.tab.beliDateFrom||'';
  const toD=S.tab.beliDateTo||'';
  // Toko list: gabung masterToko + unique dari pembelian

  const tokoSorted=[...tokoSet].sort((a,b)=>a.localeCompare(b,'id'));
  const prjOpts=`<option value="">Semua Proyek</option>`+S.projects.map(p=>`<option value="${esc(p.kode)}"${S.beliFilter===p.kode?' selected':''}>${esc(p.nama)}</option>`).join('');
  const tokoOpts=`<option value="">Semua Toko</option>`+tokoSorted.map(t=>`<option value="${esc(t)}"${(S.beliTokoFilter||'')===t?' selected':''}>${esc(t)}</option>`).join('');

    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">

      <button class="tab ${dateMode==='thismonth'?'tab-on':'tab-off'} btn-sm" onclick="setBeliDateFilter('thismonth')">Bulan Ini</button>
      <button class="tab ${dateMode==='custom'?'tab-on':'tab-off'} btn-sm" onclick="setBeliDateFilter('custom')">Custom</button>
    </div>
    ${dateMode==='custom'?`<div class="g2" style="margin-bottom:8px">
      <div class="fg"><label class="fl">Dari</label><input class="fc" type="date" value="${fromD}" onchange="S.tab.beliDateFrom=this.value;go('beli')"></div>
      <div class="fg"><label class="fl">Sampai</label><input class="fc" type="date" value="${toD}" onchange="S.tab.beliDateTo=this.value;go('beli')"></div>
    </div>`:''}
    <div class="g2" style="margin-bottom:8px">
      <select class="fc" onchange="S.beliFilter=this.value;go('beli')">${prjOpts}</select>
      <select class="fc" onchange="S.beliTokoFilter=this.value;go('beli')">${tokoOpts}</select>
    </div>
    <input class="fc" type="search" id="beli-log-q" placeholder="🔍 Cari nama barang..."
      value="${esc(S.beliLogQ||'')}"
      oninput="S.beliLogQ=this.value;_renderBeliItems()"
      style="font-size:14px;margin-bottom:10px">`;
  return filterBar+`<div id="beli-items">${_beliItemsList()}</div>`;
}
function _beliItemsList(){
  const dateMode=S.tab.beliDateMode||'all';
  const fromD=S.tab.beliDateFrom||'';
  const toD=S.tab.beliDateTo||'';
  const q=(S.beliLogQ||'').toLowerCase().trim();
  let filtered=[...S.pembelian].sort((a,b)=>String(b.tgl||'').localeCompare(String(a.tgl||'')));
  if(S.beliFilter)       filtered=filtered.filter(b=>b.kodeProj===S.beliFilter);
  if(S.beliTokoFilter)   filtered=filtered.filter(b=>(b.toko||'').trim()===S.beliTokoFilter);
  filtered=filterByDate(filtered,dateMode,fromD,toD);
  if(q) filtered=filtered.filter(b=>(b.namaBarang||'').toLowerCase().includes(q));
  if(!filtered.length)return`<div class="empty">Tidak ada data yang sesuai filter</div>`;
  return filtered.slice(0,80).map(b=>beliItemCard(b,true)).join('');
}
function _renderBeliItems(){
  const el=document.getElementById('beli-items');
  if(el)el.innerHTML=_beliItemsList();
}

function beliCekHarga(){
  return `<div class="fg" style="margin-bottom:10px">
    <input class="fc" type="search" id="cek-harga-q" placeholder="🔍 Ketik nama barang..."
      value="${esc(S.beliSearchQ||'')}"
      oninput="S.beliSearchQ=this.value;_renderCekHarga()"
      style="font-size:15px">
  </div>
  <div id="cek-harga-results">${_cekHargaResults()}</div>`;
}
function _cekHargaResults(){
  const q=(S.beliSearchQ||'').toLowerCase().trim();
  if(!q)return`<div class="empty" style="padding:30px 20px">Ketik nama barang untuk cek harga &amp; riwayat</div>`;
  if(!S.masterBarang.length)return`<div class="empty">Data master barang kosong.<br>Sync dulu untuk memuat data.</div>`;
  const items=S.masterBarang.filter(b=>b.nama.toLowerCase().includes(q));
  if(!items.length)return`<div class="empty">Barang "<strong>${esc(q)}</strong>" belum ada di database</div>`;
  const total=`<div style="font-size:11px;color:#94a3b8;margin-bottom:8px">${items.length} item ditemukan${items.length>30?' · tampil 30 teratas':''}</div>`;
  const cards=items.slice(0,30).map(b=>{
    const hist=S.pembelian
      .filter(p=>p.namaBarang.toLowerCase()===b.nama.toLowerCase()&&Number(p.harga)>0)
      .sort((a,c)=>c.tgl.localeCompare(a.tgl))
      .slice(0,6);
    const prices=hist.map(h=>Number(h.harga));
    const minH=prices.length?Math.min(...prices):null;
    const maxH=prices.length?Math.max(...prices):null;
    const avgH=prices.length?Math.round(prices.reduce((s,v)=>s+v,0)/prices.length):null;
    const rangeBar=prices.length>1?`<div style="display:flex;gap:10px;margin:5px 0 6px;flex-wrap:wrap">
      <span style="font-size:11px;background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:20px">Min ${fRp(minH)}</span>
      <span style="font-size:11px;background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:20px">Avg ${fRp(avgH)}</span>
      <span style="font-size:11px;background:#fee2e2;color:#b91c1c;padding:2px 8px;border-radius:20px">Max ${fRp(maxH)}</span>
    </div>`:prices.length===1?`<div style="margin-bottom:5px"></div>`:'';
    const histRows=hist.map(h=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:11.5px">
      <div><span style="color:#475569;font-weight:600">${fDate(h.tgl)}</span>${h.toko?` · <span style="color:#64748b">${esc(h.toko)}</span>`:''}</div>
      <div style="font-weight:700;color:#1e293b">${fRp(h.harga)} <span style="color:#94a3b8;font-weight:400">/ ${esc(h.satuan||b.satuan||'pcs')}</span></div>
    </div>`).join('');
    return `<div class="card" style="margin-bottom:8px">
      <div class="row" style="margin-bottom:2px">
        <div style="flex:1;min-width:0">
          <div class="item-name">${esc(b.nama)}</div>
          <div class="item-sub">${esc(b.kategori||'')}${b.kategori&&b.satuan?' · ':''}${esc(b.satuan||'')}</div>
        </div>
        <div style="text-align:right;margin-left:10px;flex-shrink:0">
          <div style="font-size:16px;font-weight:800;color:#10b981">${fRp(b.hargaTerakhir)}</div>
          <div style="font-size:10px;color:#94a3b8">harga terakhir</div>
        </div>
      </div>
      ${rangeBar}
      ${hist.length?`<div style="border-top:1px solid #f1f5f9;padding-top:4px">${histRows}</div>`:'<div style="font-size:11px;color:#94a3b8;margin-top:4px">Belum ada riwayat pembelian</div>'}
    </div>`;
  }).join('');
  return total+cards;
}
function _renderCekHarga(){
  const el=document.getElementById('cek-harga-results');
  if(el)el.innerHTML=_cekHargaResults();
}

        <span style="color:#10b981">${fRp(total)}</span>
      </div>
    </div>
    <div class="act-row" style="margin-top:16px">
      <button class="btn btn-g btn-sm" onclick="closeModal()">❌ Batal</button>
      <button class="btn btn-p btn-sm" style="flex:1" onclick="executeBeli()">✅ Konfirmasi & Simpan</button>
    </div>`);
}

function executeBeli(){
  const tgl=document.getElementById('beli-tgl').value;
  const kodeProj=document.getElementById('beli-prj').value;
  if(!kodeProj){showToast('Pilih proyek','err');return;}
  if(S.formItems.some(it=>!it.namaBarang||!it.harga)){showToast('Lengkapi nama & harga','err');return;}
  const newItems=S.formItems.map(it=>({id:'BLI-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),tgl,kodeProj,...it,harga:Number(it.harga),qty:Number(it.qty),diskon:Number(it.diskon)||0}));
  S.pembelian.push(...newItems);ss(KS.beli,S.pembelian);
  const brg=[...S.masterBarang],tk=[...S.masterToko];
  newItems.forEach(it=>{if(!brg.find(b=>b.nama.toLowerCase()===it.namaBarang.toLowerCase()))brg.push({id:padId('BRG',brg,'id'),nama:it.namaBarang,kategori:it.kategori,satuan:it.satuan,hargaTerakhir:it.harga});if(it.toko&&!tk.includes(it.toko))tk.push(it.toko);});
  S.masterBarang=brg;S.masterToko=tk;ss(KS.brg,brg);ss(KS.toko,tk);
  showToast('✅ '+newItems.length+' item disimpan');
  S.formItems=[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:0,diskon:0,status:'HABIS',toko:''}];
  S.formBeliProj='';S.formBeliTgl=today();
  setTab('beli','log');
  closeModal();
  doSync('addPembelian',newItems.map(it=>({tgl:it.tgl,kodeProj:it.kodeProj,namaBarang:it.namaBarang,kategori:it.kategori,satuan:it.satuan,qty:it.qty,harga:it.harga,diskon:it.diskon,status:it.status,toko:it.toko})));
}
function submitBeli(){
  const tgl=S.formBeliTgl||today();
  const kodeProj=S.formBeliProj;
  if(!kodeProj){showToast('Pilih proyek','err');return;}
  if(S.formItems.some(it=>!it.namaBarang||!it.harga)){showToast('Lengkapi nama & harga','err');return;}
  // Sinkron toko dari global input ke semua item (fix: item baru yg ditambah setelah toko diketik)
  const tokoGlobal=document.getElementById('beli-toko')?.value||'';
  if(tokoGlobal) S.formItems.forEach(x=>{if(!x.toko)x.toko=tokoGlobal;});
  const total=S.formItems.reduce((s,it)=>s+calcTotal(it),0);
  showBeliConfirmation(S.formItems,total);
}
function delPembelian(idx){
  const b=S.pembelian[idx];if(!b)return;

  doSync('deletePembelian',{tgl:b.tgl,kodeProj:b.kodeProj,namaBarang:b.namaBarang});

    </div>
    <div class="row" style="gap:8px;margin-bottom:9px">
      <div class="fg" style="flex:1"><label class="fl">Qty</label><input class="fc" type="number" id="eb-qty" value="${b.qty}"></div>

function submitEditBeli(){
  const idx=S.editBeliIdx; const orig=S.editBeliOrig;
  if(idx==null||!orig){closeModal();return;}
  const tgl=document.getElementById('eb-tgl')?.value||'';
  const kodeProj=document.getElementById('eb-proj')?.value||'';
  const namaBarang=(document.getElementById('eb-nama')?.value||'').trim();
  const kategori=document.getElementById('eb-kat')?.value||'Material';
  const satuan=(document.getElementById('eb-sat')?.value||'pcs').trim();
  const qty=Number(document.getElementById('eb-qty')?.value)||0;
  const harga=Number(document.getElementById('eb-hrg')?.value)||0;
  const diskon=Number(document.getElementById('eb-dis')?.value)||0;
  const status=document.getElementById('eb-sts')?.value||'HABIS';

function parseIdNum(s){return Number(String(s).trim().replace(/\./g,'').replace(',','.'));}
function parsePasteText(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  const items=[],errors=[];
  lines.forEach((line,i)=>{
    const parts=line.split(',').map(p=>p.trim());
    if(parts.length<3){errors.push(`Baris ${i+1}: kurang dari 3 kolom`);return;}
    const nama=parts[0],qty=parseIdNum(parts[1]),harga=parseIdNum(parts[2]),toko=parts[3]||'';
    if(!nama){errors.push(`Baris ${i+1}: nama kosong`);return;}
    if(isNaN(qty)||qty<=0){errors.push(`Baris ${i+1}: jumlah tidak valid`);return;}
    if(isNaN(harga)||harga<=0){errors.push(`Baris ${i+1}: harga tidak valid`);return;}
    items.push({namaBarang:nama,kategori:'Material',satuan:'pcs',qty,harga,diskon:0,status:'HABIS',toko});
  });
  return{items,errors};
}
function previewPasteBeli(){
  const text=document.getElementById('paste-txt').value;if(!text.trim()){showToast('Textarea masih kosong','err');return;}
  const{items,errors}=parsePasteText(text);let html='';
  if(errors.length)html+=`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:9px;padding:9px;margin-bottom:8px;font-size:12px;color:#b91c1c">⚠️ ${errors.join('<br>')}</div>`;
  if(items.length){const total=items.reduce((s,it)=>s+(it.qty*it.harga),0);html+=`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:9px;padding:9px;font-size:12px;color:#15803d">✅ <strong>${items.length} item valid</strong> — total ${fRp(total)}:<br><br>${items.map(it=>`• ${esc(it.namaBarang)} — ${it.qty}× ${fRp(it.harga)}${it.toko?' ('+esc(it.toko)+')':''}`).join('<br>')}</div>`;}
  document.getElementById('paste-preview').innerHTML=html;
}
function applyPasteBeli(){
  const text=document.getElementById('paste-txt').value;if(!text.trim()){showToast('Textarea masih kosong','err');return;}
  const{items,errors}=parsePasteText(text);if(!items.length){showToast('Tidak ada item valid','err');return;}
  const defaultOnly=S.formItems.length===1&&!S.formItems[0].namaBarang&&!S.formItems[0].harga;
  S.formItems=defaultOnly?items:[...S.formItems,...items];
  closeModal();showToast('✅ '+items.length+' item ditambahkan'+(errors.length?' ('+errors.length+' dilewati)':''));setTab('beli','input');
}

let clsRekap=[],clsSel={};

// [v1.8] Helper: bandingkan tanggal sebagai string YYYY-MM-DD (aman timezone)
function dateInRange(tgl, dari, sampai){
  if(!tgl)return false;
  const d=typeof tgl==='string'?tgl.substring(0,10):tgl;
  return d>=dari&&d<=sampai;
}

// [v1.8] Ambil daftar closing unik dari logAbsensi
function getClosingList(){
  const map={};
  S.logAbsensi.forEach(a=>{
    if(!a.noClosing||a.noClosing.trim()==='')return;
    if(!map[a.noClosing]){
      map[a.noClosing]={noClosing:a.noClosing,tglBayar:a.tglBayar||'',karyawan:[],totalUpah:0,jmlRecord:0};
    }
    const c=map[a.noClosing];
    if(!c.karyawan.includes(a.idKaryawan))c.karyawan.push(a.idKaryawan);
    c.totalUpah+=Number(a.upahHariIni)||0;
    c.jmlRecord++;
  });
  return Object.values(map).sort((a,b)=>b.noClosing.localeCompare(a.noClosing));
}

function pgClosing(){
  const tab=S.tab.closing||'baru';
  const closingList=getClosingList();
  return `<div class="row" style="margin-bottom:11px">
    <div class="sec-title" style="margin:0">Closing Gaji</div>
    <div class="tabs">
      <button class="tab ${tab==='baru'?'tab-on':'tab-off'}" onclick="setTab('closing','baru')">+ Baru</button>
      <button class="tab ${tab==='log'?'tab-on':'tab-off'}" onclick="setTab('closing','log')">Log${closingList.length>0?' ('+closingList.length+')':''}</button>
    </div></div>
  ${tab==='baru'?closingBaru():closingLog()}`;
}

function closingBaru(){

  return `<div class="card">

function closingLog(){
  const list=getClosingList();
  if(!list.length)return '<div class="empty">Belum ada data closing<br><br><button class="btn btn-o btn-sm" onclick="setTab(this.dataset.p,this.dataset.t)" data-p="closing" data-t="baru">+ Buat Closing</button></div>';
  return list.map(c=>{
    const ksbPotong=S.logKasbon.filter(x=>x.noClosing===c.noClosing&&x.tipe==='POTONG').reduce((s,x)=>s+(Number(x.nominal)||0),0);
    const bonusTotal=S.logKasbon.filter(x=>x.noClosing===c.noClosing&&x.tipe==='BONUS').reduce((s,x)=>s+(Number(x.nominal)||0),0);
    const netBayar=c.totalUpah+bonusTotal-ksbPotong;
    return `<div class="card" style="cursor:pointer" onclick="openClosingDetail('${esc(c.noClosing)}')">

        <div style="flex:1;min-width:0">
          <div class="item-name" style="color:#1d4ed8">🔒 ${esc(c.noClosing)}</div>
          <div class="item-sub" style="margin-top:3px">📅 ${fDate(c.tglBayar)} &nbsp;·&nbsp; 👷 ${c.karyawan.length} karyawan &nbsp;·&nbsp; ${c.jmlRecord} hari kerja</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px">
          <span style="font-size:11px;color:#64748b">Lihat detail →</span>
          <button style="background:#fee2e2;border:none;border-radius:8px;padding:6px 9px;font-size:13px;cursor:pointer;color:#b91c1c" onclick="event.stopPropagation();confirmDeleteClosing('${esc(c.noClosing)}')">🗑</button>
        </div>
      </div>
      <div class="g3">
        <div class="chip" style="background:#f0fdf4"><div class="chip-lbl">Total Upah</div><div class="chip-val" style="color:#16a34a">${fRp(c.totalUpah)}</div></div>

// ── Detail Closing — modal rincian per karyawan
function openClosingDetail(noClosing){
  const c=getClosingList().find(x=>x.noClosing===noClosing);
  if(!c)return;

  // Kumpulkan semua absensi terkait closing ini, group per karyawan
  const absClosing=S.logAbsensi.filter(a=>a.noClosing===noClosing);
  const ksbClosing=S.logKasbon.filter(k=>k.noClosing===noClosing&&k.tipe==='POTONG');
  const bonClosing=S.logKasbon.filter(k=>k.noClosing===noClosing&&k.tipe==='BONUS');
  // Map bonus per karyawan
  const bonMap={};bonClosing.forEach(b=>{bonMap[b.idKaryawan]=(bonMap[b.idKaryawan]||0)+(Number(b.nominal)||0);});

  // Group absensi per karyawan
  const byKaryawan={};
  absClosing.forEach(a=>{
    if(!byKaryawan[a.idKaryawan]){
      byKaryawan[a.idKaryawan]={
        id:a.idKaryawan,nama:a.nama||a.idKaryawan,
        records:[],totalUpah:0,
      };
    }
    byKaryawan[a.idKaryawan].records.push(a);
    byKaryawan[a.idKaryawan].totalUpah+=Number(a.upahHariIni)||0;
  });

  const totalUpah=Object.values(byKaryawan).reduce((s,k)=>s+k.totalUpah,0);
  const totalPotong=ksbClosing.reduce((s,k)=>s+(Number(k.nominal)||0),0);
  const totalBonus=bonClosing.reduce((s,k)=>s+(Number(k.nominal)||0),0);
  const netTotal=totalUpah+totalBonus-totalPotong;

  // Build rows per karyawan
  const krRows=Object.values(byKaryawan).map(kr=>{
    const potong=ksbClosing.filter(k=>k.idKaryawan===kr.id).reduce((s,k)=>s+(Number(k.nominal)||0),0);
    const bonus=bonMap[kr.id]||0;
    const net=kr.totalUpah+bonus-potong;
    // Sort records by date
    const sorted=[...kr.records].sort((a,b)=>String(a.tgl||'').localeCompare(String(b.tgl||'')));
    const hariHadir=sorted.filter(r=>r.status==='Hadir').length;
    const hariSetengah=sorted.filter(r=>r.status==='Setengah Hari').length;
    // Absensi detail rows
    const absRows=sorted.map(r=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9">
        <div>
          <span style="font-size:11px;color:#475569">${fDate(r.tgl)}</span>
          <span style="margin-left:6px;font-size:10px;padding:1px 6px;border-radius:9px;font-weight:600;background:${r.status==='Hadir'?'#dcfce7':r.status==='Setengah Hari'?'#fef9c3':'#f1f5f9'};color:${r.status==='Hadir'?'#15803d':r.status==='Setengah Hari'?'#854d0e':'#475569'}">${r.status}</span>
          ${r.kodeProj?`<span style="font-size:10px;color:#94a3b8;margin-left:4px">${esc(S.projects.find(p=>p.kode===r.kodeProj)?.nama||r.kodeProj)}</span>`:''}
          ${(Number(r.jamLembur)>0)?`<span style="font-size:10px;color:#d97706;margin-left:4px;font-weight:700">⏰${r.jamLembur}j</span>`:''}
        </div>
        <span style="font-size:12px;font-weight:600;color:#16a34a">${fRp(r.upahHariIni)}</span>
      </div>`).join('');

    return `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:11px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-weight:700;font-size:13px;color:#1e293b">${esc(kr.nama)}</div>
          <div style="font-size:10px;color:#94a3b8;margin-top:2px">${kr.records.length} hari · ${hariHadir}× Hadir${hariSetengah>0?' · '+hariSetengah+'× Setengah':''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:#64748b">Upah: <strong style="color:#16a34a">${fRp(kr.totalUpah)}</strong></div>
          ${bonus!==0?`<div style="font-size:11px;color:${bonus>0?'#d97706':'#dc2626'}">${bonus>0?'🎁 Bonus: + '+fRp(bonus):'↩️ Koreksi: - '+fRp(Math.abs(bonus))}</div>`:''}
          ${potong>0?`<div style="font-size:11px;color:#7c3aed">Potong: -${fRp(potong)}</div>`:''}
          <div style="font-size:13px;font-weight:800;color:${net>=0?'#1d4ed8':'#dc2626'}">Net: ${fRp(net)}</div>
        </div>
      </div>
      <div style="max-height:200px;overflow-y:auto;padding-top:4px">
        ${absRows}
      </div>
    </div>`;
  }).join('');

  openModal(`
    <div class="modal-title">🔒 ${esc(noClosing)}</div>

    <!-- Summary header -->
    <div style="background:#0f172a;border-radius:12px;padding:12px;margin-bottom:14px">
      <div style="color:#94a3b8;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Ringkasan Closing</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="color:#cbd5e1;font-size:12px">📅 Tgl Bayar</span>
        <span style="color:#fff;font-weight:600;font-size:12px">${fDate(c.tglBayar)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="color:#cbd5e1;font-size:12px">👷 Karyawan</span>
        <span style="color:#fff;font-weight:600;font-size:12px">${c.karyawan.length} orang · ${c.jmlRecord} hari kerja</span>
      </div>
      <div style="height:1px;background:#334155;margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="color:#94a3b8;font-size:11px">Total Upah</span>
        <span style="color:#34d399;font-weight:700">${fRp(totalUpah)}</span>
      </div>
      ${totalBonus!==0?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="color:#94a3b8;font-size:11px">${totalBonus>0?'🎁 Total Bonus':'↩️ Koreksi Bonus'}</span>
        <span style="color:${totalBonus>0?'#fbbf24':'#f87171'};font-weight:600">${totalBonus>0?'+ '+fRp(totalBonus):'- '+fRp(Math.abs(totalBonus))}</span>
      </div>`:''}
      ${totalPotong>0?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="color:#94a3b8;font-size:11px">Kasbon Dipotong</span>
        <span style="color:#c084fc;font-weight:600">- ${fRp(totalPotong)}</span>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid #334155;margin-top:4px">
        <span style="color:#fff;font-size:13px;font-weight:700">💵 Net Dibayar</span>
        <span style="color:#60a5fa;font-size:16px;font-weight:800">${fRp(netTotal)}</span>
      </div>
    </div>

    <!-- Per karyawan -->
    <div style="font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Rincian per Karyawan</div>
    <div style="max-height:50vh;overflow-y:auto">
      ${krRows||'<div class="empty">Tidak ada data absensi</div>'}
    </div>

    <div class="act-row" style="margin-top:12px">
      <button class="btn btn-g" style="flex:1" onclick="closeModal()">Tutup</button>
      <button class="btn btn-d btn-sm" onclick="closeModal();confirmDeleteClosing('${esc(noClosing)}')">🗑 Batalkan Closing</button>
    </div>`);
}

function genClosing(){
  const dari=document.getElementById('cls-dari').value;
  const sampai=document.getElementById('cls-smp').value;
  if(!dari||!sampai){showToast('Pilih periode','err');return;}
  if(dari>sampai){showToast('Tanggal dari harus sebelum sampai','err');return;}
  // Gunakan string comparison — aman dari timezone issue
  clsRekap=S.karyawan.map(k=>{
    const abs=S.logAbsensi.filter(a=>
      a.idKaryawan===k.id &&
      a.statusBayar==='Belum Dibayar' &&
      dateInRange(a.tgl,dari,sampai)
    );
    if(!abs.length)return null;
    const tu=abs.reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
    const am=S.logKasbon.filter(x=>x.idKaryawan===k.id&&x.tipe==='AMBIL').reduce((s,x)=>s+(Number(x.nominal)||0),0);
    const pt=S.logKasbon.filter(x=>x.idKaryawan===k.id&&x.tipe==='POTONG').reduce((s,x)=>s+(Number(x.nominal)||0),0);
    const sisaKasbon=Math.max(0,am-pt);
    // Breakdown hari & lembur
    const hariHadir=abs.filter(a=>a.status==='Hadir').length;
    const hariSetengah=abs.filter(a=>a.status==='Setengah Hari').length;
    const jamLembur=abs.reduce((s,a)=>s+(Number(a.jamLembur)||0),0);
    const upahLembur=abs.reduce((s,a)=>s+(Number(a.upahLembur)||0),0);
    const upahPokok=tu-upahLembur;
    // Hitung proyek mayoritas (default proyek untuk bonus)
    const projCount={};abs.forEach(a=>{if(a.kodeProj)projCount[a.kodeProj]=(projCount[a.kodeProj]||0)+1;});
    const majorityProj=Object.keys(projCount).sort((a,b)=>projCount[b]-projCount[a])[0]||'';
    return{idKaryawan:k.id,nama:k.nama,hari:abs.length,hariHadir,hariSetengah,jamLembur,upahPokok,upahLembur,totalUpah:tu,sisaKasbon,kasbonDipotong:sisaKasbon,ksbProj:majorityProj,bonusAmount:0,bonusProj:majorityProj};
  }).filter(r=>r!==null);
  clsSel=Object.fromEntries(clsRekap.map(r=>[r.idKaryawan,true]));
  if(!clsRekap.length){showToast('Tidak ada absensi "Belum Dibayar" di periode ini','err');return;}
  showToast('✅ '+clsRekap.length+' karyawan ditemukan');
  document.getElementById('cls-rekap').innerHTML=buildClsRekap();
}

function toggleAllCls(pilih){
  clsRekap.forEach(r=>clsSel[r.idKaryawan]=pilih);
  // Re-render rekap
  document.getElementById('cls-rekap').innerHTML=buildClsRekap();
}
function toggleSatuCls(idKaryawan,checked){
  clsSel[idKaryawan]=checked;
  // Update total tanpa re-render penuh
  const total=clsRekap.filter(r=>clsSel[r.idKaryawan]).reduce((s,r)=>s+(r.totalUpah+(r.bonusAmount||0)-(r.kasbonDipotong||0)),0);
  const el=document.getElementById('cls-total');
  if(el)el.textContent=fRp(total);
  const selCount=clsRekap.filter(r=>clsSel[r.idKaryawan]).length;
  const elCnt=document.getElementById('cls-sel-count');
  if(elCnt)elCnt.textContent=selCount+' / '+clsRekap.length+' karyawan dipilih';
}
function updateClsNet(i){
  const ksbRaw=(document.getElementById('cls-ksb-'+i)?.value||'').replace(/[^0-9]/g,'');
  const bonRaw=(document.getElementById('cls-bon-'+i)?.value||'').replace(/[^0-9-]/g,'');
  const projEl=document.getElementById('cls-bonproj-'+i);
  const ksbProjEl=document.getElementById('cls-ksbproj-'+i);
  clsRekap[i].kasbonDipotong=parseInt(ksbRaw)||0;
  clsRekap[i].bonusAmount=parseInt(bonRaw)||0;
  if(projEl)clsRekap[i].bonusProj=projEl.value;
  if(ksbProjEl)clsRekap[i].ksbProj=ksbProjEl.value;
  const net=clsRekap[i].totalUpah+clsRekap[i].bonusAmount-clsRekap[i].kasbonDipotong;
  const netEl=document.getElementById('cls-net-'+i);
  if(netEl){netEl.textContent=fRp(net);netEl.style.color=net>=0?'#16a34a':'#dc2626';}
  if(clsSel[clsRekap[i].idKaryawan]){
    const tot=clsRekap.filter(r=>clsSel[r.idKaryawan]).reduce((s,r)=>s+(r.totalUpah+(r.bonusAmount||0)-(r.kasbonDipotong||0)),0);
    const el=document.getElementById('cls-total');if(el)el.textContent=fRp(tot);
  }
}

function finalizeClosing(){
  const dari=document.getElementById('cls-dari').value;
  const sampai=document.getElementById('cls-smp').value;
  const tglBayar=document.getElementById('cls-bayar').value;
  const noC=document.getElementById('cls-noc').value.trim();
  if(!dari||!sampai||!tglBayar||!noC){showToast('Lengkapi semua data','err');return;}

  // Cek noClosing tidak duplikat
  const existing=getClosingList().find(c=>c.noClosing===noC);
  if(existing){showToast('No Closing "'+noC+'" sudah dipakai! Ganti nomor.','err');return;}

  const sIds=clsRekap.filter(r=>clsSel[r.idKaryawan]).map(r=>r.idKaryawan);
  if(!sIds.length){showToast('Pilih minimal 1 karyawan','err');return;}

  // Baca ulang nilai kasbon + bonus dari input (pastikan sinkron)
  clsRekap.forEach((r,i)=>{
    const ksbInp=document.getElementById('cls-ksb-'+i);
    if(ksbInp){r.kasbonDipotong=parseInt((ksbInp.value||'').replace(/[^0-9]/g,''))||0;}
    const bonInp=document.getElementById('cls-bon-'+i);
    if(bonInp){r.bonusAmount=parseInt((bonInp.value||'').replace(/[^0-9-]/g,''))||0;}
    const projSel=document.getElementById('cls-bonproj-'+i);
    if(projSel){r.bonusProj=projSel.value;}
    const ksbProjSel=document.getElementById('cls-ksbproj-'+i);
    if(ksbProjSel){r.ksbProj=ksbProjSel.value;}
  });

  let updated=0;
  // Update status absensi — gunakan string comparison (fix bug timezone)
  S.logAbsensi=S.logAbsensi.map(a=>{
    if(!sIds.includes(a.idKaryawan))return a;
    if(a.statusBayar!=='Belum Dibayar')return a;
    if(!dateInRange(a.tgl,dari,sampai))return a;
    updated++;
    return{...a,statusBayar:'Sudah Dibayar',noClosing:noC,tglBayar};
  });
  ss(KS.abs,S.logAbsensi);

  // Tambah POTONG kasbon
  const ksbItems=clsRekap.filter(r=>clsSel[r.idKaryawan]&&Number(r.kasbonDipotong)>0);
  ksbItems.forEach(r=>{
    S.logKasbon.push({
      id:'KSB-CLO-'+Date.now()+'-'+r.idKaryawan,
      tgl:tglBayar,idKaryawan:r.idKaryawan,nama:r.nama,
      tipe:'POTONG',nominal:Number(r.kasbonDipotong),kodeProj:r.ksbProj||'',
      noClosing:noC,ket:'Potong kasbon — '+noC+(r.ksbProj?' → '+(S.projects.find(p=>p.kode===r.ksbProj)?.nama||r.ksbProj):'')
    });
  });

  // Tambah BONUS kasbon
  const bonusItems=clsRekap.filter(r=>clsSel[r.idKaryawan]&&Number(r.bonusAmount)!==0);
  bonusItems.forEach(r=>{
    S.logKasbon.push({
      id:'KSB-BON-'+Date.now()+'-'+r.idKaryawan,
      tgl:tglBayar,idKaryawan:r.idKaryawan,nama:r.nama,
      tipe:'BONUS',nominal:Number(r.bonusAmount),kodeProj:r.bonusProj||'',
      noClosing:noC,ket:'Bonus — '+noC+(r.bonusProj?' · '+r.bonusProj:'')
    });
  });
  ss(KS.ksb,S.logKasbon);

  showToast('✅ Closing '+noC+' selesai — '+updated+' absensi diupdate');
  doSync('finalizeClosing',{
    dari,sampai,tglBayar,noClosing:noC,
    selectedIds:sIds,
    kasbonItems:ksbItems.map(r=>({idKaryawan:r.idKaryawan,nama:r.nama||'',nominal:Number(r.kasbonDipotong),kodeProj:r.ksbProj||''})),
    bonusItems:bonusItems.map(r=>({idKaryawan:r.idKaryawan,nama:r.nama||'',nominal:Number(r.bonusAmount),kodeProj:r.bonusProj||''}))
  });
  clsRekap=[];clsSel={};
  setTab('closing','log');
}

// [v1.8] Hapus / batalkan closing
function confirmDeleteClosing(noClosing){
  const list=getClosingList();
  const c=list.find(x=>x.noClosing===noClosing);
  if(!c)return;
  if(!confirm('⚠️ BATALKAN CLOSING "'+noClosing+'"?\n\nIni akan:\n• Reset '+c.jmlRecord+' absensi kembali ke "Belum Dibayar"\n• Hapus kasbon POTONG terkait closing ini\n\nLanjutkan?'))return;
  deleteClosing(noClosing);
}

function deleteClosing(noClosing){
  let resetCount=0;
  // Reset status absensi
  S.logAbsensi=S.logAbsensi.map(a=>{
    if(a.noClosing!==noClosing)return a;
    resetCount++;
    return{...a,statusBayar:'Belum Dibayar',noClosing:'',tglBayar:''};
  });
  ss(KS.abs,S.logAbsensi);

  // Hapus kasbon POTONG & BONUS terkait closing ini
  const before=S.logKasbon.length;
  S.logKasbon=S.logKasbon.filter(k=>k.noClosing!==noClosing||(k.tipe!=='POTONG'&&k.tipe!=='BONUS'));
  ss(KS.ksb,S.logKasbon);
  const removedKsb=before-S.logKasbon.length;

  showToast('✅ Closing "'+noClosing+'" dibatalkan — '+resetCount+' absensi direset, '+removedKsb+' kasbon dihapus');
  doSync('deleteClosing',{noClosing});
  go('closing');
}

function loadRabForProj(kodeProj){

  S.rabLabels=ex?{mat:ex.labelMat||'',upah:ex.labelUpah||'',subkon:ex.labelSubkon||'',overhead:ex.labelOverhead||''}:{mat:'',upah:'',subkon:'',overhead:''};
  if(ex)showToast('📂 RAB dimuat','info');
  go('rab');

function saveRAB(){
  if(!S.rabKodeProj){showToast('Pilih proyek dulu','err');return;}
  // Baca label langsung dari DOM (paling akurat) lalu update state
  const lm=document.getElementById('rab-lbl-mat')?.value??S.rabLabels.mat??'';
  const lu=document.getElementById('rab-lbl-upah')?.value??S.rabLabels.upah??'';
  const ls=document.getElementById('rab-lbl-sub')?.value??S.rabLabels.subkon??'';
  const lo=document.getElementById('rab-lbl-ovh')?.value??S.rabLabels.overhead??'';
  S.rabLabels={mat:lm,upah:lu,subkon:ls,overhead:lo};
  const nom=S.rabNominal;
  const total=(Number(nom.material)||0)+(Number(nom.upah)||0)+(Number(nom.subkon)||0)+(Number(nom.overhead)||0);
  if(!total){showToast('Isi minimal satu angka','err');return;}
  const rabData={kodeProj:S.rabKodeProj,tglUpdate:today(),material:Number(nom.material)||0,upah:Number(nom.upah)||0,subkon:Number(nom.subkon)||0,overhead:Number(nom.overhead)||0,labelMat:lm,labelUpah:lu,labelSubkon:ls,labelOverhead:lo};
  const idx=S.rab.findIndex(r=>r.kodeProj===S.rabKodeProj);
  if(idx>=0)S.rab[idx]=rabData;else S.rab.push(rabData);
  ss(KS.rab,S.rab);showToast('✅ RAB disimpan');go('rab');
  doSync('saveRAB',rabData);

function deleteRAB(){

function openBayarSubkon(idx){
  const ls=S.logSubkon[idx];
  const sudahBayar=ls.nominalBayar||0;const sisa=ls.nilaiKontrak-sudahBayar;

    const id=k.idKaryawan;if(!id)return;
    if(!hutangByKar[id])hutangByKar[id]={nama:k.nama||'',hutang:0};
    if(k.tipe==='AMBIL')hutangByKar[id].hutang+=(Number(k.nominal)||0);
    if(k.tipe==='POTONG')hutangByKar[id].hutang-=(Number(k.nominal)||0);

  const karHutang=Object.entries(hutangByKar).filter(([id,v])=>v.hutang>0);
  const karOpts=karHutang.length
    ?karHutang.map(([id,v])=>`<option value="${esc(id)}">${esc(v.nama)} (hutang ${fRp(v.hutang)})</option>`).join('')
    :'<option value="">-- Tidak ada hutang kasbon --</option>';
  openModal(`<div class="modal-title">💰 Catat Pembayaran Subkon</div>
    <div style="margin-bottom:12px"><div class="item-name">${esc(ls.namaSubkon)}</div>

    </div>

    <div class="fg"><label class="fl">Cash Dibayar (Rp)<span class="req">*</span></label>
      ${numInp('sb-nom',sisa,'0','oninput="applyNiFmt(this);sbPreview()"')}

      ${numInp('sb-pot',0,'0','oninput="applyNiFmt(this);toggleKarPot()"')}

    <div class="fg" id="kar-pot-wrap" style="display:none">
      <label class="fl">Karyawan yang Dipotong<span class="req">*</span></label>
      <select class="fc" id="sb-kar">${karOpts}</select></div>

    <div class="act-row" style="justify-content:flex-end">
      <button class="btn btn-g" onclick="closeModal()">Batal</button>
      <button class="btn btn-p" onclick="saveBayarSubkon(${idx})">💾 Simpan</button></div>`);

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;-webkit-text-size-adjust:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
*{-webkit-tap-highlight-color:transparent}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:inherit;font-size:16px;background:#fff}
button{-webkit-appearance:none;font-family:inherit}
#spl{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .3s}
#spl.out{opacity:0;pointer-events:none}
.spl-logo{color:#10b981;font-size:2rem;font-weight:800;letter-spacing:-1px}
.spl-sub{color:#475569;font-size:.8rem}
.spin{width:28px;height:28px;border:3px solid #1e293b;border-top-color:#10b981;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#hdr{background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;height:calc(48px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px)}
.hdr-logo{font-weight:800;font-size:16px;color:#10b981}
.hdr-sync{font-size:11px;margin-top:1px}
.hdr-acts{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.1);border:none;color:#cbd5e1;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 20px}
#nav{background:#0f172a;display:flex;overflow-x:auto;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);padding-bottom:env(safe-area-inset-bottom,0px);scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:9px 10px;min-width:56px;flex-shrink:0;border:none;background:none;cursor:pointer;color:#64748b}
.nav-btn.on{color:#10b981}
.nav-dot{width:4px;height:4px;background:#10b981;border-radius:50%;margin-top:1px}
#toast{position:fixed;bottom:85px;left:12px;right:12px;z-index:800;padding:11px 15px;border-radius:13px;color:#fff;font-size:13px;font-weight:500;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.25);display:none;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.t-ok{background:#10b981}.t-err{background:#ef4444}.t-info{background:#3b82f6}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:14px;padding-top:56px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:480px;padding:18px;position:relative;margin-bottom:20px}
.modal-x{position:absolute;top:14px;right:14px;background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer;color:#64748b}
.modal-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:14px;padding-right:28px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f1f5f9;padding:13px;margin-bottom:9px}
.sub-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:11px;margin-bottom:8px}
.sec-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:11px}
.row{display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.item-name{font-weight:600;font-size:13.5px;color:#1e293b}
.item-sub{font-size:11px;color:#94a3b8;margin-top:1px}
.chip{background:#f8fafc;border-radius:9px;padding:7px 9px}
.chip-lbl{font-size:10px;color:#94a3b8;margin-bottom:1px}
.chip-val{font-size:12px;font-weight:700;color:#1e293b}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
.act-row{display:flex;gap:8px;margin-top:8px}
.fg{margin-bottom:11px}
.fl{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px}
.req{color:#ef4444;margin-left:2px}
.fc{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:15px;color:#1e293b;outline:none;transition:border-color .15s}
.fc:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:#10b981;color:#fff}
.btn-d{background:#ef4444;color:#fff}
.btn-g{background:#f1f5f9;color:#475569}
.btn-o{background:#fff;color:#10b981;border:1.5px solid #10b981}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px}
.btn-w{width:100%}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bdg-blue{background:#dbeafe;color:#1d4ed8}
.bdg-green{background:#dcfce7;color:#15803d}
.bdg-yellow{background:#fef9c3;color:#854d0e}
.bdg-red{background:#fee2e2;color:#b91c1c}
.bdg-gray{background:#f1f5f9;color:#475569}
.bdg-orange{background:#fed7aa;color:#c2410c}
.bdg-purple{background:#ede9fe;color:#7c3aed}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.kpi{background:#fff;border-radius:13px;padding:11px 13px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.kpi-lbl{font-size:9.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kpi-val{font-size:13px;font-weight:700;color:#1e293b;word-break:break-word}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
.tab-on{background:#10b981;color:#fff}
.tab-off{background:#f1f5f9;color:#64748b}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:11px;padding:11px;font-size:11.5px;color:#1d4ed8;line-height:1.5;margin-bottom:11px}
.info-box ol{padding-left:15px;margin-top:5px}
.prog-bar{background:#e2e8f0;border-radius:99px;height:6px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:99px;transition:width .3s}
</style>
</head>
<body>
<div id="spl">
  <div class="spl-logo">Arthabumi</div>
  <div class="spin"></div>
  <div class="spl-sub">Memuat aplikasi…</div>
</div>
<div id="app">
  <div id="hdr">
    <div>
      <div class="hdr-logo">Arthabumi</div>
      <div class="hdr-sync" id="sync-badge">⚪ Lokal</div>
    </div>
    <div class="hdr-acts">
      <span id="retry-badge" style="display:none;font-size:11px;color:#fdba74;background:rgba(251,146,60,.15);padding:4px 8px;border-radius:7px"></span>
      <button class="hdr-btn" id="btn-sync" style="display:none;background:rgba(16,185,129,.25);color:#6ee7b7" onclick="manualSync()">↻ GSheet</button>
      <button class="hdr-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav"></nav>
</div>
<div id="toast"></div>
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════
// ARTHABUMI v1.7b — RAB Simple Per Kategori + Subkontraktor
// Pure Vanilla JS — Zero Dependencies
// ═══════════════════════════════════════════════════

const S = {
  page:'dashboard', tab:{},
  projects:[], pembelian:[], karyawan:[],
  logAbsensi:[], logKasbon:[], logPembayaran:[],
  masterBarang:[], masterToko:[],
  rab:[], masterSubkon:[], logSubkon:[],
  webAppUrl:'', pollInterval:60,
  syncing:false, lastSync:null, syncError:null,
  countdown:0, retryQ:[],
  formItems:[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:'',diskon:0,status:'HABIS',toko:''}],
  payItems:[{kodeProj:'',nominal:'',metode:'Transfer',bank:'',ket:'',ref:''}],
  absRows:[],
  rabKodeProj:'',
  rabNominal:{material:0,upah:0,subkon:0,overhead:0},
  dashFilter:'Berjalan',
};

const KS={p:'ab3-p',beli:'ab3-beli',kr:'ab3-kr',abs:'ab3-abs',ksb:'ab3-ksb',bayar:'ab3-bayar',brg:'ab3-brg',toko:'ab3-toko',url:'ab3-url',poll:'ab3-poll',rab:'ab3-rab',sk:'ab3-sk',lsk:'ab3-lsk'};
const sg=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
function loadLocal(){
  S.projects=sg(KS.p,[]);S.pembelian=sg(KS.beli,[]);S.karyawan=sg(KS.kr,[]);
  S.logAbsensi=sg(KS.abs,[]);S.logKasbon=sg(KS.ksb,[]);S.logPembayaran=sg(KS.bayar,[]);
  S.masterBarang=sg(KS.brg,[]);S.masterToko=sg(KS.toko,[]);
  S.rab=sg(KS.rab,[]);S.masterSubkon=sg(KS.sk,[]);S.logSubkon=sg(KS.lsk,[]);
}

// ── Utilities ──────────────────────────────────────
const fRp=v=>'Rp '+(Number(v)||0).toLocaleString('id-ID');
const fDate=d=>{if(!d)return'-';try{
  if(typeof d==='string'&&d.match(/^\d{4}-\d{2}-\d{2}$/)){const[y,m,dy]=d.split('-').map(Number);return new Date(y,m-1,dy).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});}
  return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}catch{return d;}};
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const calcTotal=it=>{const b=(Number(it.qty)||0)*(Number(it.harga)||0),d=it.diskon>0?b*(it.diskon/100):0;return it.status==='ASET'?0:b-d;};
const padId=(pfx,arr,key='id')=>pfx+'-'+String(Math.max(0,...arr.map(x=>parseInt((x[key]||'0').split('-').pop())||0))+1).padStart(3,'0');
const bdgClass=s=>({Berjalan:'bdg-blue',Selesai:'bdg-green',Hold:'bdg-yellow',Batal:'bdg-red',Hadir:'bdg-green','Tidak Hadir':'bdg-red','Setengah Hari':'bdg-yellow',Libur:'bdg-gray',AMBIL:'bdg-orange',POTONG:'bdg-purple','Belum Dibayar':'bdg-red','Sudah Dibayar':'bdg-green',DP:'bdg-orange',Lunas:'bdg-green'}[s]||'bdg-gray');
const bdg=(s,extra='')=>`<span class="bdg ${bdgClass(s)} ${extra}">${esc(s)}</span>`;
function showToast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`t-${type}`;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',type==='err'?6000:type==='info'?2000:4000);}

// ── GSheet API ─────────────────────────────────────
async function gsFetch(url){
  const r=await fetch(url+'?action=getAllData&t='+Date.now(),{redirect:'follow',cache:'no-cache'});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();if(!j.ok)throw new Error(j.error||'GSheet error');return j.data;
}
async function gsWrite(url,action,data){
  const payloadStr=JSON.stringify(data);
  if(payloadStr.length>7000)throw new Error('Data terlalu besar');
  const r=await fetch(url+'?action='+action+'&payload='+encodeURIComponent(payloadStr)+'&t='+Date.now(),{redirect:'follow',cache:'no-cache'});
  if(!r.ok)throw new Error('HTTP '+r.status);
  let j;try{j=await r.json();}catch{throw new Error('Response bukan JSON');}
  if(!j.ok)throw new Error(j.error||'Apps Script error');
  return j.data;
}
function applyGS(d){
  if(!d)return;
  if(d.projects){S.projects=d.projects;ss(KS.p,d.projects);}
  if(d.pembelian){S.pembelian=d.pembelian;ss(KS.beli,d.pembelian);}
  if(d.karyawan){S.karyawan=d.karyawan;ss(KS.kr,d.karyawan);}
  if(d.logAbsensi){S.logAbsensi=d.logAbsensi;ss(KS.abs,d.logAbsensi);}
  if(d.logKasbon){S.logKasbon=d.logKasbon;ss(KS.ksb,d.logKasbon);}
  if(d.logPembayaran){S.logPembayaran=d.logPembayaran;ss(KS.bayar,d.logPembayaran);}
  if(d.barang){S.masterBarang=d.barang;ss(KS.brg,d.barang);}
  if(d.toko){S.masterToko=d.toko;ss(KS.toko,d.toko);}
  if(d.rab){S.rab=d.rab;ss(KS.rab,d.rab);}
  if(d.subkon){S.masterSubkon=d.subkon;ss(KS.sk,d.subkon);}
  if(d.logSubkon){S.logSubkon=d.logSubkon;ss(KS.lsk,d.logSubkon);}
  S.lastSync=new Date();S.syncError=null;updateSyncBadge();
}
async function doFetch(url){
  const u=url||S.webAppUrl;if(!u)return;
  S.syncing=true;updateSyncBadge();
  try{const d=await gsFetch(u);applyGS(d);}
  catch(e){S.syncError=e.message;showToast('⚠️ GSheet gagal','err');}
  finally{S.syncing=false;updateSyncBadge();}
}
async function doSync(action,payload){
  if(!S.webAppUrl)return;
  S.syncing=true;S.syncError=null;updateSyncBadge();
  showToast('🔄 Menyimpan ke GSheet…','info');
  try{const d=await gsWrite(S.webAppUrl,action,payload);applyGS(d);showToast('✅ GSheet berhasil diupdate!');go(S.page);}
  catch(e){S.syncError=e.message;S.retryQ.push({action,payload,retries:0});showToast('❌ Gagal: '+e.message,'err');}
  finally{S.syncing=false;updateSyncBadge();}
}
function updateSyncBadge(){
  const el=document.getElementById('sync-badge');if(!el)return;
  if(!S.webAppUrl){el.textContent='⚪ Lokal';el.style.color='#64748b';}
  else if(S.syncing){el.textContent='🔄 Sync…';el.style.color='#60a5fa';}
  else if(S.syncError){el.textContent='⚠️ Gagal';el.style.color='#f87171';}
  else if(S.lastSync){el.textContent='✅ '+S.lastSync.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})+(S.countdown>0?' ·'+S.countdown+'d':'');el.style.color='#34d399';}
  else{el.textContent='⚡ GSheet';el.style.color='#fbbf24';}
  const rb=document.getElementById('retry-badge');if(rb){rb.style.display=S.retryQ.length>0?'inline':'none';rb.textContent='⏳'+S.retryQ.length;}
  const sb=document.getElementById('btn-sync');if(sb)sb.style.display=S.webAppUrl?'block':'none';
}
function manualSync(){S.countdown=S.pollInterval;doFetch();}

let countdownTimer=null;
function startPoll(){
  if(countdownTimer)clearInterval(countdownTimer);
  if(!S.webAppUrl||!S.pollInterval||S.pollInterval<=0)return;
  S.countdown=S.pollInterval;
  countdownTimer=setInterval(()=>{S.countdown--;updateSyncBadge();if(S.countdown<=0){S.countdown=S.pollInterval;if(!S.syncing)doFetch();}},1000);
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&S.webAppUrl&&!S.syncing){
    const gap=S.lastSync?(Date.now()-S.lastSync.getTime()):Infinity;
    if(gap>30000)doFetch();
  }
});
setInterval(async()=>{
  if(!S.webAppUrl||S.retryQ.length===0||S.syncing)return;
  const item=S.retryQ[0];if(!item)return;
  if(item.retries>=3){S.retryQ.shift();showToast('❌ Retry gagal 3x','err');return;}
  S.syncing=true;
  try{const d=await gsWrite(S.webAppUrl,item.action,item.payload);applyGS(d);S.retryQ.shift();showToast('✅ Retry OK');}
  catch{item.retries++;}
  finally{S.syncing=false;updateSyncBadge();}
},30000);

// ── Navigation ─────────────────────────────────────
const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'📊'},
  {id:'project',label:'Proyek',icon:'🏗️'},
  {id:'beli',label:'Pembelian',icon:'🛒'},
  {id:'karyawan',label:'Karyawan',icon:'👷'},
  {id:'absensi',label:'Absensi',icon:'📋'},
  {id:'kasbon',label:'Kasbon',icon:'💸'},
  {id:'closing',label:'Closing',icon:'🔒'},
  {id:'bayar',label:'Bayar',icon:'💰'},
  {id:'rab',label:'RAB',icon:'📐'},
  {id:'subkon',label:'Subkon',icon:'🔨'},
];
function buildNav(){
  return NAV.map(n=>`<button class="nav-btn${S.page===n.id?' on':''}" onclick="go('${n.id}')">
    <span style="font-size:19px;line-height:1">${n.icon}</span>
    <span style="font-size:9.5px;font-weight:500">${n.label}</span>
    ${S.page===n.id?'<div class="nav-dot"></div>':''}
  </button>`).join('');
}
function go(page){
  S.page=page;if(!S.tab[page])S.tab[page]='input';
  document.getElementById('content').innerHTML=buildPage(page);
  document.getElementById('nav').innerHTML=buildNav();
  window.scrollTo&&window.scrollTo(0,0);
}

// ── Modal ──────────────────────────────────────────
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function openSettings(){
  openModal(`
    <div class="modal-title">⚙️ Pengaturan GSheet</div>
    <div class="info-box"><strong>Cara deploy Apps Script:</strong><ol>
      <li>Google Sheets → Extensions → Apps Script</li>
      <li>Paste isi arthabumi-webapi.gs</li>
      <li>Deploy → New deployment → Web app</li>
      <li>Execute as: Me | Access: Anyone → copy URL</li>
    </ol></div>
    <div class="fg"><label class="fl">Web App URL</label>
      <input class="fc" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(S.webAppUrl)}">
    </div>
    <div class="fg"><label class="fl">Auto-Sync Interval</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${[{v:30,l:'30 dtk'},{v:60,l:'1 mnt'},{v:120,l:'2 mnt'},{v:300,l:'5 mnt'},{v:0,l:'Manual'}].map(o=>`<button class="tab ${S.pollInterval===o.v?'tab-on':'tab-off'}" onclick="setPoll(${o.v})">${o.l}</button>`).join('')}
      </div>
    </div>
    <div id="cfg-res"></div>
    <div class="act-row" style="flex-wrap:wrap">
      <button class="btn btn-o btn-sm" onclick="testConn()">🔍 Test</button>
      <button class="btn btn-p btn-sm" onclick="saveSettings()">💾 Simpan</button>
      ${S.webAppUrl?'<button class="btn btn-d btn-sm" onclick="clearGS()">🔌 Putus</button>':''}
    </div>`);
}
function setPoll(v){S.pollInterval=v;document.querySelectorAll('#overlay .tab').forEach((btn,i)=>{const vals=[30,60,120,300,0];btn.className='tab '+(vals[i]===v?'tab-on':'tab-off');});}
async function testConn(){
  const url=document.getElementById('cfg-url').value.trim();if(!url)return;
  const el=document.getElementById('cfg-res');el.textContent='🔄 Testing…';
  try{const d=await gsFetch(url);el.textContent=`✅ OK! ${d.projects?.length||0} proyek, ${d.karyawan?.length||0} karyawan.`;el.style.color='#15803d';}
  catch(e){el.textContent='❌ '+e.message;el.style.color='#b91c1c';}
}
async function saveSettings(){
  const url=document.getElementById('cfg-url').value.trim();

}

function setDashFilter(v){S.dashFilter=v;go('dashboard');}
function pgDashboard(){
  const filtered=S.dashFilter==='Semua'?S.projects:S.projects.filter(p=>p.status===S.dashFilter);
  const tK=filtered.reduce((s,p)=>s+(Number(p.nilaiKontrak)||0),0);
  const tB=S.logPembayaran.filter(x=>filtered.find(p=>p.kode===x.kodeProj)).reduce((s,p)=>s+(Number(p.nominal)||0),0);
  const tM=S.pembelian.filter(b=>b.status!=='ASET'&&filtered.find(p=>p.kode===b.kodeProj)).reduce((s,b)=>s+calcTotal(b),0);
  const tU=S.logAbsensi.filter(a=>filtered.find(p=>p.kode===a.kodeProj)).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const tSK=S.logSubkon.filter(ls=>filtered.find(p=>p.kode===ls.kodeProj)).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
  const tL=tK-(tM+tU+tSK);
  const statuses=['Semua','Berjalan','Selesai','Hold','Batal'];
  const filterBar=statuses.map(s=>`<button onclick="setDashFilter('${s}')" style="padding:6px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:${S.dashFilter===s?'#10b981':'#f1f5f9'};color:${S.dashFilter===s?'#fff':'#64748b'};flex-shrink:0">${s}${S.dashFilter===s?' ('+filtered.length+')':''}</button>`).join('');
  const rows=filtered.map(p=>{
    const biaya=S.pembelian.filter(b=>b.kodeProj===p.kode&&b.status!=='ASET').reduce((s,b)=>s+calcTotal(b),0)
      +S.logAbsensi.filter(a=>a.kodeProj===p.kode).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0)
      +S.logSubkon.filter(ls=>ls.kodeProj===p.kode).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
    const bayar=S.logPembayaran.filter(x=>x.kodeProj===p.kode).reduce((s,x)=>s+(Number(x.nominal)||0),0);
    const laba=(Number(p.nilaiKontrak)||0)-biaya,piutang=(Number(p.nilaiKontrak)||0)-bayar;
    const rab=S.rab.find(r=>r.kodeProj===p.kode);
    const rabTotal=rab?(rab.material||0)+(rab.upah||0)+(rab.subkon||0)+(rab.overhead||0):0;
    const pct=rabTotal>0?Math.min(100,Math.round(biaya/rabTotal*100)):0;
    return `<div class="card">
      <div class="row" style="margin-bottom:8px">
        <div><div class="item-name">${esc(p.nama)}</div><div class="item-sub">${esc(p.kode)} · ${esc(p.jenis)}</div></div>
        ${bdg(p.status)}
      </div>
      <div class="g3">
        <div class="chip"><div class="chip-lbl">Kontrak</div><div class="chip-val">${fRp(p.nilaiKontrak)}</div></div>
        <div class="chip"><div class="chip-lbl">Biaya</div><div class="chip-val" style="color:#ea580c">${fRp(biaya)}</div></div>
        <div class="chip"><div class="chip-lbl">Laba</div><div class="chip-val" style="color:${laba>=0?'#16a34a':'#dc2626'}">${fRp(laba)}</div></div>
        <div class="chip"><div class="chip-lbl">Bayar</div><div class="chip-val" style="color:#2563eb">${fRp(bayar)}</div></div>
        <div class="chip" style="${piutang>0?'background:#fff7ed':''}"><div class="chip-lbl">Piutang</div><div class="chip-val" style="color:${piutang>0?'#dc2626':'#64748b'}">${fRp(piutang)}</div></div>
        ${rabTotal>0
          ?`<div class="chip" style="background:#eff6ff"><div class="chip-lbl">RAB</div><div class="chip-val" style="color:#1d4ed8">${fRp(rabTotal)}</div></div>`
          :`<div class="chip" style="background:#fef9c3;cursor:pointer" onclick="S.rabKodeProj='${p.kode}';go('rab')"><div class="chip-lbl">RAB</div><div class="chip-val" style="color:#854d0e;font-size:10px">+ Buat</div></div>`}
      </div>
      ${rabTotal>0&&biaya>0?`<div style="margin-top:8px">
        <div style="font-size:10px;color:#94a3b8;margin-bottom:3px">Realisasi vs RAB: ${pct}%</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${biaya>rabTotal?'#ef4444':'#10b981'}"></div></div>
      </div>`:''}
    </div>`;
  });
  return `
    <div class="sec-title">Dashboard</div>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none">${filterBar}</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Kontrak</div><div class="kpi-val" style="color:#2563eb">${fRp(tK)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Total Biaya</div><div class="kpi-val" style="color:#ea580c">${fRp(tM+tU+tSK)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Est. Laba</div><div class="kpi-val" style="color:${tL>=0?'#16a34a':'#dc2626'}">${fRp(tL)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Diterima</div><div class="kpi-val" style="color:#7c3aed">${fRp(tB)}</div></div>
    </div>
    ${rows.length===0?'<div class="empty">Tidak ada proyek '+esc(S.dashFilter)+'</div>':rows.join('')}`;
}

function saveProject(isEdit){
  const kode=document.getElementById('p-kode').value.trim();
  const nama=document.getElementById('p-nama').value.trim();
  const kontrak=document.getElementById('p-kontrak').value;
  if(!kode||!nama||!kontrak){showToast('Lengkapi field wajib','err');return;}
  const d={kode,nama,jenis:document.getElementById('p-jenis').value,status:document.getElementById('p-sts').value,nilaiKontrak:Number(kontrak),tglMulai:document.getElementById('p-tgl').value};
  if(isEdit){const i=Number(document.getElementById('p-idx').value);S.projects[i]=d;}else S.projects.push(d);
  ss(KS.p,S.projects);closeModal();go('project');
  showToast(isEdit?'✅ Proyek diperbarui':'✅ Proyek ditambahkan');
  doSync(isEdit?'updateProject':'addProject',d);
}
function delProject(kode){
  if(!confirm('Hapus proyek '+kode+'?'))return;
  S.projects=S.projects.filter(p=>p.kode!==kode);ss(KS.p,S.projects);go('project');
  showToast('🗑 Dihapus');doSync('deleteProject',{kode});
}

function beliInput(){
  if(!S.formItems||!S.formItems.length)S.formItems=[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:'',diskon:0,status:'HABIS',toko:''}];

  const items=S.formItems.map((it,i)=>`<div class="sub-card">
    <div class="row" style="margin-bottom:8px">
      <span style="font-size:11px;font-weight:600;color:#64748b">Item ${i+1}</span>

      <div class="fg"><label class="fl">Diskon%</label><input class="fc" type="number" value="${it.diskon}" oninput="S.formItems[${i}].diskon=this.value"></div>
    </div>

      <div class="fg"><label class="fl">Status</label><select class="fc" onchange="S.formItems[${i}].status=this.value"><option ${it.status==='HABIS'?'selected':''}>HABIS</option><option ${it.status==='SISA'?'selected':''}>SISA</option><option ${it.status==='ASET'?'selected':''}>ASET</option></select></div>

        <input class="fc" list="tk-dl" value="${esc(it.toko)}" oninput="S.formItems[${i}].toko=this.value">

      <button class="btn btn-g" style="flex:1" onclick="addBeliRow()">+ Baris</button>
      <button class="btn btn-p" style="flex:1" onclick="submitBeli()">💾 Simpan</button>
    </div>

}
function beliLog(){
  const list=[...S.pembelian].reverse().slice(0,60);
  return list.length===0?'<div class="empty">Belum ada data</div>':list.map(b=>{
    const ri=S.pembelian.findIndex(x=>x.id===b.id);
    return `<div class="card"><div class="row" style="margin-bottom:6px">
      <div style="flex:1;min-width:0"><div class="item-name">${esc(b.namaBarang)}</div><div class="item-sub">${fDate(b.tgl)} · ${esc(b.kodeProj)} · ${esc(b.toko||'')}</div></div>
      <div style="display:flex;align-items:center;gap:8px;margin-left:8px;flex-shrink:0">
        <div style="text-align:right"><div style="font-weight:700;font-size:13px;color:#10b981">${fRp(calcTotal(b))}</div>${bdg(b.status)}</div>
        <button style="background:#fee2e2;border:none;border-radius:7px;padding:5px 9px;font-size:14px;cursor:pointer;color:#b91c1c" onclick="delPembelian(${ri})">🗑</button>
      </div>
    </div><div class="item-sub">${b.qty} ${esc(b.satuan)} × ${fRp(b.harga)}${Number(b.diskon)>0?' -'+b.diskon+'%':''}</div></div>`;
  }).join('');
}
function addBeliRow(){S.formItems.push({namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:'',diskon:0,status:'HABIS',toko:''});go('beli');}
function delBeliRow(i){S.formItems.splice(i,1);if(!S.formItems.length)S.formItems=[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:'',diskon:0,status:'HABIS',toko:''}];go('beli');}
function submitBeli(){
  const tgl=document.getElementById('beli-tgl').value;
  const kodeProj=document.getElementById('beli-prj').value;
  if(!kodeProj){showToast('Pilih proyek','err');return;}
  if(S.formItems.some(it=>!it.namaBarang||!it.harga)){showToast('Lengkapi nama & harga','err');return;}
  const newItems=S.formItems.map(it=>({id:'BLI-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),tgl,kodeProj,...it,harga:Number(it.harga),qty:Number(it.qty),diskon:Number(it.diskon)||0}));
  S.pembelian.push(...newItems);ss(KS.beli,S.pembelian);
  const brg=[...S.masterBarang],tk=[...S.masterToko];
  newItems.forEach(it=>{if(!brg.find(b=>b.nama.toLowerCase()===it.namaBarang.toLowerCase()))brg.push({id:padId('BRG',brg,'id'),nama:it.namaBarang,kategori:it.kategori,satuan:it.satuan,hargaTerakhir:it.harga});if(it.toko&&!tk.includes(it.toko))tk.push(it.toko);});
  S.masterBarang=brg;S.masterToko=tk;ss(KS.brg,brg);ss(KS.toko,tk);
  showToast('✅ '+newItems.length+' item disimpan');
  S.formItems=[{namaBarang:'',kategori:'Material',satuan:'pcs',qty:1,harga:'',diskon:0,status:'HABIS',toko:''}];
  setTab('beli','log');
  doSync('addPembelian',newItems.map(it=>({tgl:it.tgl,kodeProj:it.kodeProj,namaBarang:it.namaBarang,kategori:it.kategori,satuan:it.satuan,qty:it.qty,harga:it.harga,diskon:it.diskon,status:it.status,toko:it.toko})));
}
function delPembelian(idx){
  const b=S.pembelian[idx];if(!b)return;
  if(!confirm('Hapus "'+b.namaBarang+'"?'))return;
  S.pembelian.splice(idx,1);ss(KS.beli,S.pembelian);showToast('🗑 Dihapus');go('beli');
  doSync('deletePembelian',{tgl:b.tgl,kodeProj:b.kodeProj,namaBarang:b.namaBarang});
}
function openPasteBeli(){
  openModal(`<div class="modal-title">📋 Paste Daftar Pembelian</div>
    <div class="info-box"><strong>Format per baris:</strong><br>
      <code style="background:#dbeafe;padding:2px 6px;border-radius:4px">nama barang, jumlah, harga, nama toko</code><br><br>
      Contoh:<br><code>Semen hitam, 5, 55000, Toko A<br>Besi hollow, 10, 45.000</code><br><br>
      <span style="color:#64748b;font-size:10.5px">💡 Toko boleh kosong. Harga boleh pakai titik (55.000).</span>
    </div>
    <div class="fg"><label class="fl">Paste di sini</label>
      <textarea class="fc" id="paste-txt" rows="7" style="resize:vertical;font-family:monospace;font-size:13px;line-height:1.7"></textarea>
    </div>
    <div id="paste-preview" style="margin-bottom:8px"></div>
    <div class="act-row" style="flex-wrap:wrap">
      <button class="btn btn-g btn-sm" onclick="closeModal()">Batal</button>
      <button class="btn btn-o btn-sm" onclick="previewPasteBeli()">👁 Preview</button>
      <button class="btn btn-p btn-sm" onclick="applyPasteBeli()">✅ Tambah ke Form</button>
    </div>`);
}
function parseIdNum(s){return Number(String(s).trim().replace(/\./g,'').replace(',','.'));}
function parsePasteText(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  const items=[],errors=[];
  lines.forEach((line,i)=>{
    const parts=line.split(',').map(p=>p.trim());
    if(parts.length<3){errors.push(`Baris ${i+1}: kurang dari 3 kolom`);return;}
    const nama=parts[0],qty=parseIdNum(parts[1]),harga=parseIdNum(parts[2]),toko=parts[3]||'';
    if(!nama){errors.push(`Baris ${i+1}: nama kosong`);return;}
    if(isNaN(qty)||qty<=0){errors.push(`Baris ${i+1}: jumlah tidak valid`);return;}
    if(isNaN(harga)||harga<=0){errors.push(`Baris ${i+1}: harga tidak valid`);return;}
    items.push({namaBarang:nama,kategori:'Material',satuan:'pcs',qty,harga,diskon:0,status:'HABIS',toko});
  });
  return{items,errors};
}
function previewPasteBeli(){
  const text=document.getElementById('paste-txt').value;if(!text.trim()){showToast('Textarea masih kosong','err');return;}
  const{items,errors}=parsePasteText(text);let html='';
  if(errors.length)html+=`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:9px;padding:9px;margin-bottom:8px;font-size:12px;color:#b91c1c">⚠️ ${errors.join('<br>')}</div>`;
  if(items.length){const total=items.reduce((s,it)=>s+(it.qty*it.harga),0);html+=`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:9px;padding:9px;font-size:12px;color:#15803d">✅ <strong>${items.length} item valid</strong> — total ${fRp(total)}:<br><br>${items.map(it=>`• ${esc(it.namaBarang)} — ${it.qty}× ${fRp(it.harga)}${it.toko?' ('+esc(it.toko)+')':''}`).join('<br>')}</div>`;}
  document.getElementById('paste-preview').innerHTML=html;
}
function applyPasteBeli(){
  const text=document.getElementById('paste-txt').value;if(!text.trim()){showToast('Textarea masih kosong','err');return;}
  const{items,errors}=parsePasteText(text);if(!items.length){showToast('Tidak ada item valid','err');return;}
  const defaultOnly=S.formItems.length===1&&!S.formItems[0].namaBarang&&!S.formItems[0].harga;
  S.formItems=defaultOnly?items:[...S.formItems,...items];
  closeModal();showToast('✅ '+items.length+' item ditambahkan'+(errors.length?' ('+errors.length+' dilewati)':''));setTab('beli','input');
}

function pgAbsensi(){

function absInput(){
  const STS=['Hadir','Setengah','Tidak Hadir','Libur'];
  const STS_FULL={'Hadir':'Hadir','Setengah':'Setengah Hari','Tidak Hadir':'Tidak Hadir','Libur':'Libur'};

  const rows=S.karyawan.map((k,i)=>{
    const r=S.absRows[i]||{status:'',kodeProj:'',ket:''};

    const upahHariIni=curFull==='Hadir'?k.upahHarian:curFull==='Setengah Hari'?k.upahHarian*0.5:0;
    const stsBtns=STS.map(s=>{const full=STS_FULL[s],active=curFull===full,col=STS_COLOR[s];return `<button type="button" onclick="setAbsRow(${i},'status','${full}')" style="flex:1;padding:8px 2px;border-radius:9px;border:2px solid ${active?col:'#e2e8f0'};background:${active?col:'#fff'};color:${active?'#fff':'#64748b'};font-size:11px;font-weight:600;cursor:pointer">${s}</button>`;}).join('');
    const projSel=`<select class="fc" style="font-size:13px" onchange="setAbsRow(${i},'kodeProj',this.value)"><option value="">— Default —</option>${S.projects.map(p=>`<option value="${esc(p.kode)}" ${r.kodeProj===p.kode?'selected':''}>${esc(p.nama)}</option>`).join('')}</select>`;
    return `<div class="card" style="margin-bottom:8px">
      <div class="row" style="margin-bottom:8px">
        <div><div class="item-name">${esc(k.nama)}</div><div class="item-sub">${k.jabatan} · ${fRp(k.upahHarian)}/hr</div></div>
        ${upahHariIni>0?`<span style="font-weight:700;color:#10b981;font-size:14px;flex-shrink:0">${fRp(upahHariIni)}</span>`:'<span style="font-size:11px;color:#94a3b8">Belum pilih</span>'}

    <div class="g2">
      <div class="fg"><label class="fl">Tanggal</label><input class="fc" type="date" id="abs-tgl" value="${today()}"></div>
      <div class="fg"><label class="fl">Proyek Default</label><select class="fc" id="abs-prj"><option value="">— Tidak ada —</option>${S.projects.map(p=>`<option value="${esc(p.kode)}">${esc(p.nama)}</option>`).join('')}</select></div>
    </div>
    <div style="font-size:11px;color:#94a3b8;margin-top:-4px">💡 Proyek default untuk karyawan yang belum pilih</div>
  </div>
  ${S.karyawan.length===0?'<div class="empty">Tambah karyawan dulu</div>':rows}
  ${S.karyawan.length>0?`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:11px;padding:10px;margin-bottom:10px;font-size:12px;color:#15803d">
    ✅ Hadir: <strong>${S.karyawan.filter((_,i)=>S.absRows[i]?.status==='Hadir').length}</strong> &nbsp;
    🟡 Setengah: <strong>${S.karyawan.filter((_,i)=>S.absRows[i]?.status==='Setengah Hari').length}</strong> &nbsp;
    ❌ Tidak: <strong>${S.karyawan.filter((_,i)=>S.absRows[i]?.status==='Tidak Hadir').length}</strong>
  </div>
  <button class="btn btn-p btn-w" onclick="submitAbsensi()">💾 Simpan Absensi</button>`:''}`;
}
function setAbsRow(i,key,val){if(!S.absRows[i])S.absRows[i]={status:'',kodeProj:'',ket:''};S.absRows[i][key]=val;if(key==='status')go('absensi');}
function submitAbsensi(){
  const tgl=document.getElementById('abs-tgl')?.value||today();
  const defProj=document.getElementById('abs-prj')?.value||'';
  const active=S.karyawan.map((k,i)=>({k,r:S.absRows[i]||{}})).filter(({r})=>r.status&&r.status!=='Tidak Hadir'&&r.status!=='Libur');
  if(!active.length){showToast('Pilih status minimal 1 karyawan','err');return;}
  const newAbs=active.map(({k,r})=>{const upah=r.status==='Hadir'?k.upahHarian:r.status==='Setengah Hari'?k.upahHarian*0.5:0;return{id:'ABS-'+Date.now()+'-'+k.id,tgl,idKaryawan:k.id,nama:k.nama,status:r.status,kodeProj:r.kodeProj||defProj,upahHariIni:upah,statusBayar:'Belum Dibayar',noClosing:'',ket:r.ket||''};});
  S.logAbsensi.push(...newAbs);ss(KS.abs,S.logAbsensi);
  showToast('✅ Absensi '+active.length+' karyawan tersimpan');S.absRows=[];setTab('absensi','log');
  doSync('addAbsensi',newAbs.map(a=>({tgl:a.tgl,idKaryawan:a.idKaryawan,status:a.status,kodeProj:a.kodeProj,upahHariIni:a.upahHariIni,ket:a.ket})));
}
function absLog(){
  const list=[...S.logAbsensi].reverse().slice(0,80);
  if(!list.length)return '<div class="empty">Belum ada data</div>';
  return list.map(a=>{

    return `<div class="card"><div class="row" style="margin-bottom:6px">
      <div style="flex:1;min-width:0"><div class="item-name">${esc(a.nama)}</div><div class="item-sub">${fDate(a.tgl)} · ${esc(a.kodeProj||'')} · ${fRp(a.upahHariIni)}</div></div>
      <div style="display:flex;align-items:center;gap:6px;margin-left:8px;flex-shrink:0">
        ${bdg(a.status)}
        ${a.statusBayar!=='Sudah Dibayar'?`<button style="background:#fee2e2;border:none;border-radius:7px;padding:4px 8px;font-size:12px;cursor:pointer;color:#b91c1c" onclick="delAbsensi(${ri})">🗑</button>`:''}
      </div>
    </div><div>${bdg(a.statusBayar)}</div></div>`;
  }).join('');
}
function delAbsensi(idx){
  const a=S.logAbsensi[idx];if(!a)return;
  if(a.statusBayar==='Sudah Dibayar'){showToast('Tidak bisa hapus — sudah di-closing','err');return;}
  if(!confirm('Hapus absensi '+esc(a.nama)+'?'))return;
  S.logAbsensi.splice(idx,1);ss(KS.abs,S.logAbsensi);showToast('🗑 Dihapus');go('absensi');
  doSync('deleteAbsensi',{tgl:a.tgl,idKaryawan:a.idKaryawan});
}

// ════════════════════════════════════════════════════
// ── CLOSING GAJI ──────────────────────────────────────
// ════════════════════════════════════════════════════
let clsRekap=[],clsSel={};
function pgClosing(){
  return `<div class="sec-title">Closing Gaji</div>
    <div class="card">
      <div class="g2"><div class="fg"><label class="fl">Dari</label><input class="fc" type="date" id="cls-dari"></div>
      <div class="fg"><label class="fl">Sampai</label><input class="fc" type="date" id="cls-smp" value="${today()}"></div></div>
      <div class="g2"><div class="fg"><label class="fl">Tgl Bayar</label><input class="fc" type="date" id="cls-bayar" value="${today()}"></div>
      <div class="fg"><label class="fl">No Closing</label><input class="fc" id="cls-noc" value="CLO-${new Date().toISOString().slice(0,7).replace('-','')}-001"></div></div>
      <button class="btn btn-o btn-w" onclick="genClosing()">📊 Generate Rekap</button>
    </div>
    <div id="cls-rekap">${clsRekap.length>0?buildClsRekap():''}</div>`;
}
function genClosing(){
  const dari=document.getElementById('cls-dari').value,sampai=document.getElementById('cls-smp').value;
  if(!dari||!sampai){showToast('Pilih periode','err');return;}
  const dMs=new Date(dari).getTime(),sMs=new Date(sampai).getTime();
  clsRekap=S.karyawan.map(k=>{
    const abs=S.logAbsensi.filter(a=>a.idKaryawan===k.id&&a.statusBayar==='Belum Dibayar'&&new Date(a.tgl).getTime()>=dMs&&new Date(a.tgl).getTime()<=sMs);
    const tu=abs.reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
    const am=S.logKasbon.filter(x=>x.idKaryawan===k.id&&x.tipe==='AMBIL').reduce((s,x)=>s+(Number(x.nominal)||0),0);
    const pt=S.logKasbon.filter(x=>x.idKaryawan===k.id&&x.tipe==='POTONG').reduce((s,x)=>s+(Number(x.nominal)||0),0);
    return{idKaryawan:k.id,nama:k.nama,hari:abs.length,totalUpah:tu,sisaKasbon:Math.max(0,am-pt),kasbonDipotong:0};
  }).filter(r=>r.hari>0);
  clsSel=Object.fromEntries(clsRekap.map(r=>[r.idKaryawan,true]));
  if(!clsRekap.length){showToast('Tidak ada absensi belum dibayar','err');return;}
  showToast('✅ '+clsRekap.length+' karyawan ditemukan');
  document.getElementById('cls-rekap').innerHTML=buildClsRekap();
}
function buildClsRekap(){
  return clsRekap.map((r,i)=>{
    const net=r.totalUpah-Number(r.kasbonDipotong||0);
    return `<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <input type="checkbox" ${clsSel[r.idKaryawan]?'checked':''} onchange="clsSel['${r.idKaryawan}']=this.checked" style="width:20px;height:20px">
      <span class="item-name">${esc(r.nama)}</span></div>
      <div class="g2" style="margin-bottom:8px">
        <div class="chip"><div class="chip-lbl">Hari · Upah</div><div class="chip-val">${r.hari} hr · ${fRp(r.totalUpah)}</div></div>
        <div class="chip" style="background:#fff7ed"><div class="chip-lbl">Sisa Kasbon</div><div class="chip-val" style="color:#c2410c">${fRp(r.sisaKasbon)}</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:11px;color:#64748b;white-space:nowrap">Kasbon potong:</label>
        <input class="fc" type="number" value="${r.kasbonDipotong}" style="flex:1" oninput="clsRekap[${i}].kasbonDipotong=Number(this.value);document.getElementById('cls-net-${i}').textContent='${fRp(0)}'.replace('0',new Intl.NumberFormat('id-ID').format(clsRekap[${i}].totalUpah-clsRekap[${i}].kasbonDipotong))">
        <span id="cls-net-${i}" style="font-weight:700;font-size:13px;color:${net>=0?'#16a34a':'#dc2626'};white-space:nowrap">${fRp(net)}</span>
      </div></div>`;
  }).join('')+'<button class="btn btn-p btn-w" onclick="finalizeClosing()" style="margin-top:4px">🔒 Finalize Closing</button>';
}
function finalizeClosing(){
  const dari=document.getElementById('cls-dari').value,sampai=document.getElementById('cls-smp').value;
  const tglBayar=document.getElementById('cls-bayar').value,noC=document.getElementById('cls-noc').value;
  if(!dari||!sampai||!tglBayar){showToast('Lengkapi data','err');return;}
  const dMs=new Date(dari).getTime(),sMs=new Date(sampai).getTime();
  const sIds=clsRekap.filter(r=>clsSel[r.idKaryawan]).map(r=>r.idKaryawan);
  S.logAbsensi=S.logAbsensi.map(a=>{
    if(!sIds.includes(a.idKaryawan)||a.statusBayar!=='Belum Dibayar')return a;
    const tMs=new Date(a.tgl).getTime();if(tMs<dMs||tMs>sMs)return a;
    return{...a,statusBayar:'Sudah Dibayar',noClosing:noC,tglBayar};
  });
  ss(KS.abs,S.logAbsensi);
  const ksbItems=clsRekap.filter(r=>clsSel[r.idKaryawan]&&Number(r.kasbonDipotong)>0);
  ksbItems.forEach(r=>{S.logKasbon.push({id:'KSB-CLO-'+Date.now()+'-'+r.idKaryawan,tgl:tglBayar,idKaryawan:r.idKaryawan,nama:r.nama,tipe:'POTONG',nominal:Number(r.kasbonDipotong),noClosing:noC,ket:'Potong '+noC});});
  ss(KS.ksb,S.logKasbon);showToast('✅ Closing '+noC+' selesai');
  doSync('finalizeClosing',{dari,sampai,tglBayar,noClosing:noC,selectedIds:sIds,kasbonItems:ksbItems.map(r=>({idKaryawan:r.idKaryawan,nominal:Number(r.kasbonDipotong)}))});
  clsRekap=[];clsSel={};go('closing');
}

function addPayRow(){S.payItems.push({kodeProj:'',nominal:'',metode:'Transfer',bank:'',ket:'',ref:''});go('bayar');}

function submitPay(){
  if(S.payItems.some(it=>!it.kodeProj||!it.nominal)){showToast('Lengkapi proyek & nominal','err');return;}

  S.payItems=[{kodeProj:'',nominal:'',metode:'Transfer',bank:'',ket:'',ref:''}];setTab('bayar','log');

function loadRabForProj(kodeProj){
  S.rabKodeProj=kodeProj;
  const ex=S.rab.find(r=>r.kodeProj===kodeProj);
  S.rabNominal=ex?{material:ex.material||0,upah:ex.upah||0,subkon:ex.subkon||0,overhead:ex.overhead||0}:{material:0,upah:0,subkon:0,overhead:0};
  if(ex)showToast('📂 RAB dimuat','info');
  go('rab');
}
function saveRAB(){
  if(!S.rabKodeProj){showToast('Pilih proyek dulu','err');return;}
  const nom=S.rabNominal;
  const total=(Number(nom.material)||0)+(Number(nom.upah)||0)+(Number(nom.subkon)||0)+(Number(nom.overhead)||0);
  if(!total){showToast('Isi minimal satu angka','err');return;}
  const rabData={kodeProj:S.rabKodeProj,tglUpdate:today(),material:Number(nom.material)||0,upah:Number(nom.upah)||0,subkon:Number(nom.subkon)||0,overhead:Number(nom.overhead)||0};
  const idx=S.rab.findIndex(r=>r.kodeProj===S.rabKodeProj);
  if(idx>=0)S.rab[idx]=rabData;else S.rab.push(rabData);
  ss(KS.rab,S.rab);showToast('✅ RAB disimpan');go('rab');
  doSync('saveRAB',rabData);
}
function rabPerbandingan(){
  const prjOpts=`<option value="">— Pilih Proyek —</option>`+S.projects.map(p=>`<option value="${esc(p.kode)}" ${S.rabKodeProj===p.kode?'selected':''}>${esc(p.kode)} — ${esc(p.nama)}</option>`).join('');
  if(!S.rabKodeProj)return `<div class="card"><div class="fg"><label class="fl">Pilih Proyek</label><select class="fc" onchange="S.rabKodeProj=this.value;go('rab')">${prjOpts}</select></div></div><div class="empty">Pilih proyek untuk melihat perbandingan</div>`;
  const rab=S.rab.find(r=>r.kodeProj===S.rabKodeProj);
  const proj=S.projects.find(p=>p.kode===S.rabKodeProj);
  if(!rab)return `<div class="card"><div class="fg"><label class="fl">Pilih Proyek</label><select class="fc" onchange="S.rabKodeProj=this.value;go('rab')">${prjOpts}</select></div></div>
    <div class="empty">Belum ada RAB untuk proyek ini<br><button class="btn btn-o btn-sm" style="margin-top:10px" onclick="setTab('rab','input')">+ Buat RAB</button></div>`;
  const realMat=S.pembelian.filter(b=>b.kodeProj===S.rabKodeProj&&b.status!=='ASET').reduce((s,b)=>s+calcTotal(b),0);
  const realUpah=S.logAbsensi.filter(a=>a.kodeProj===S.rabKodeProj).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const realSubkon=S.logSubkon.filter(ls=>ls.kodeProj===S.rabKodeProj).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
  const rabTotal=(rab.material||0)+(rab.upah||0)+(rab.subkon||0)+(rab.overhead||0);
  const realTotal=realMat+realUpah+realSubkon;
  const rowComp=(lbl,icon,rabVal,realVal)=>{
    if(rabVal===0&&realVal===0)return '';
    const sel=realVal-rabVal,pct=rabVal>0?Math.round(realVal/rabVal*100):(realVal>0?999:0),isOver=sel>0&&rabVal>0;
    return `<div class="card" style="margin-bottom:8px">
      <div class="row" style="margin-bottom:10px">
        <span style="font-weight:600;font-size:13px">${icon} ${lbl}</span>
        ${rabVal>0?`<span class="bdg ${isOver?'bdg-red':'bdg-green'}">${isOver?'▲ Over':'✓ OK'}</span>`:'<span class="bdg bdg-gray">Belum ada RAB</span>'}
      </div>

        <div class="chip"><div class="chip-lbl">RAB</div><div class="chip-val">${fRp(rabVal)}</div></div>
        <div class="chip" style="background:${isOver?'#fef2f2':'#f0fdf4'}">
          <div class="chip-lbl">Realisasi${rabVal>0?' ('+pct+'%)':''}</div>
          <div class="chip-val" style="color:${isOver?'#dc2626':'#16a34a'}">${fRp(realVal)}</div>
        </div>
      </div>
      ${rabVal>0?`<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,pct)}%;background:${pct>100?'#ef4444':pct>80?'#f59e0b':'#10b981'}"></div></div>`:''}
      ${sel!==0&&rabVal>0?`<div style="font-size:11px;margin-top:5px;color:${isOver?'#dc2626':'#16a34a'}">${isOver?'⚠️ Melebihi RAB':'✅ Hemat'}: ${fRp(Math.abs(sel))}</div>`:''}
    </div>`;
  };
  return `<div class="card" style="margin-bottom:10px">
    <div class="fg" style="margin-bottom:0"><label class="fl">Pilih Proyek</label><select class="fc" onchange="S.rabKodeProj=this.value;go('rab')">${prjOpts}</select></div>
  </div>
  <div class="card" style="margin-bottom:10px">
    <div class="row" style="margin-bottom:8px"><div class="item-name">${esc(proj?.nama||S.rabKodeProj)}</div><span style="font-size:10px;color:#94a3b8">RAB: ${fDate(rab.tglUpdate)}</span></div>
    <div class="g3">
      <div class="kpi"><div class="kpi-lbl">Kontrak</div><div class="kpi-val" style="color:#2563eb;font-size:11px">${fRp(proj?.nilaiKontrak||0)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Total RAB</div><div class="kpi-val" style="color:#ea580c;font-size:11px">${fRp(rabTotal)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Realisasi</div><div class="kpi-val" style="color:${realTotal>rabTotal?'#dc2626':'#16a34a'};font-size:11px">${fRp(realTotal)}</div></div>
    </div>
  </div>
  ${rowComp('Material','🧱',rab.material||0,realMat)}
  ${rowComp('Upah Tenaga','👷',rab.upah||0,realUpah)}
  ${rowComp('Subkontraktor','🔨',rab.subkon||0,realSubkon)}
  ${rab.overhead>0?rowComp('Overhead','📦',rab.overhead||0,0):''}
  <div class="card" style="margin-top:4px">
    <div class="row" style="margin-bottom:10px"><span style="font-weight:700">Total Keseluruhan</span></div>
    <div class="g2">
      <div class="chip"><div class="chip-lbl">Total RAB</div><div class="chip-val">${fRp(rabTotal)}</div></div>
      <div class="chip" style="background:${realTotal>rabTotal?'#fef2f2':'#f0fdf4'}">
        <div class="chip-lbl">Total Realisasi</div>
        <div class="chip-val" style="color:${realTotal>rabTotal?'#dc2626':'#16a34a'}">${fRp(realTotal)}</div>
      </div>
    </div>
    ${rabTotal>0?`<div class="prog-bar" style="margin-top:10px"><div class="prog-fill" style="width:${Math.min(100,Math.round(realTotal/rabTotal*100))}%;background:${realTotal>rabTotal?'#ef4444':'#10b981'}"></div></div>
    <div style="font-size:12px;margin-top:6px"><span style="color:#64748b">Selisih: </span>
    <span style="font-weight:700;color:${realTotal>rabTotal?'#dc2626':'#16a34a'}">${realTotal>rabTotal?'⚠️ Over':'✅ Hemat'} ${fRp(Math.abs(realTotal-rabTotal))}</span></div>`:''}
    <div style="text-align:center;margin-top:12px"><button class="btn btn-o btn-sm" onclick="loadRabForProj('${esc(S.rabKodeProj)}');setTab('rab','input')">✏️ Edit RAB</button></div>
  </div>`;
}

    return `<div class="card">

          <div class="item-sub">${fDate(ls.tgl)} · ${esc(ls.namaProj||ls.kodeProj)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px">
          <div style="font-weight:700;font-size:13px">${fRp(ls.nilaiKontrak)}</div>
          ${bdg(ls.statusBayar)}
        </div>
      </div>
      ${ls.nominalBayar>0?`<div style="font-size:12px;color:#64748b;margin-bottom:8px">Dibayar: <strong style="color:#16a34a">${fRp(ls.nominalBayar)}</strong> · Sisa: <strong style="color:${sisa>0?'#dc2626':'#64748b'}">${fRp(sisa)}</strong></div>`:''}
      <div class="act-row">
        ${ls.statusBayar!=='Lunas'?`<button class="btn btn-o btn-sm" onclick="openBayarSubkon(${ri})">💰 Bayar</button>`:''}
        <button class="btn btn-d btn-sm" onclick="delLogSubkon(${ri})">🗑 Hapus</button>
      </div>
    </div>`;
  }).join('');
}
function openBayarSubkon(idx){
  const ls=S.logSubkon[idx];const sisa=ls.nilaiKontrak-(ls.nominalBayar||0);
  openModal(`<div class="modal-title">💰 Catat Pembayaran Subkon</div>
    <div style="margin-bottom:12px"><div class="item-name">${esc(ls.namaSubkon)}</div><div class="item-sub">${esc(ls.uraian)} · ${esc(ls.namaProj||ls.kodeProj)}</div></div>
    <div class="g3" style="margin-bottom:12px">
      <div class="chip"><div class="chip-lbl">Kontrak</div><div class="chip-val">${fRp(ls.nilaiKontrak)}</div></div>
      <div class="chip" style="background:#f0fdf4"><div class="chip-lbl">Dibayar</div><div class="chip-val" style="color:#16a34a">${fRp(ls.nominalBayar||0)}</div></div>
      <div class="chip" style="background:#fff7ed"><div class="chip-lbl">Sisa</div><div class="chip-val" style="color:#c2410c">${fRp(sisa)}</div></div>
    </div>
    <div class="fg"><label class="fl">Tgl Bayar</label><input class="fc" type="date" id="sb-tgl" value="${today()}"></div>
    <div class="fg"><label class="fl">Nominal Bayar (sisa: ${fRp(sisa)})</label><input class="fc" type="number" id="sb-nom" value="${sisa}"></div>
    <div class="fg"><label class="fl">Update Status</label><select class="fc" id="sb-sts">
      <option ${ls.statusBayar==='Belum Dibayar'?'selected':''}>Belum Dibayar</option>
      <option ${ls.statusBayar==='DP'?'selected':''}>DP</option>
      <option ${ls.statusBayar==='Lunas'?'selected':''}>Lunas</option>
    </select></div>
    <div class="act-row" style="justify-content:flex-end">
      <button class="btn btn-g" onclick="closeModal()">Batal</button>
      <button class="btn btn-p" onclick="saveBayarSubkon(${idx})">💾 Simpan</button>
    </div>`);
}
function saveBayarSubkon(idx){
  const nom=Number(document.getElementById('sb-nom').value)||0;
  const tgl=document.getElementById('sb-tgl').value;
  const sts=document.getElementById('sb-sts').value;
  const ls=S.logSubkon[idx];
  S.logSubkon[idx].nominalBayar=(ls.nominalBayar||0)+nom;
  S.logSubkon[idx].statusBayar=sts;
  S.logSubkon[idx].tglBayar=tgl;
  ss(KS.lsk,S.logSubkon);
  closeModal();
  showToast('✅ Pembayaran dicatat');
  go('subkon');
  doSync('updateLogSubkon',{
    kodeProj:    ls.kodeProj,
    uraian:      ls.uraian,
    nominalBayar:S.logSubkon[idx].nominalBayar,
    statusBayar: sts,
    tglBayar:    tgl
  });
}
function delLogSubkon(idx){
  const ls=S.logSubkon[idx];
  if(!confirm('Hapus pekerjaan "'+ls.uraian+'"?'))return;
  S.logSubkon.splice(idx,1);
  ss(KS.lsk,S.logSubkon);
  showToast('🗑 Dihapus');
  go('subkon');
  doSync('deleteLogSubkon',{
    kodeProj: ls.kodeProj,
    uraian:   ls.uraian
  });
}
function subkonMaster(){
  return `<div class="row" style="margin-bottom:11px"><div></div>
    <button class="btn btn-p btn-sm" onclick="openAddSubkon()">+ Tambah Subkon</button>
  </div>
  ${!S.masterSubkon.length?'<div class="empty">Belum ada data subkontraktor</div>':S.masterSubkon.map((sk,i)=>{
    const totalK=S.logSubkon.filter(ls=>ls.idSubkon===sk.id).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
    const totalB=S.logSubkon.filter(ls=>ls.idSubkon===sk.id).reduce((s,ls)=>s+(Number(ls.nominalBayar)||0),0);
    const sisa=totalK-totalB;
    return `<div class="card"><div class="row">
      <div style="flex:1;min-width:0">
        <div class="item-name">${esc(sk.nama)}</div>
        <div class="item-sub">${esc(sk.spesialisasi)}${sk.noHP?' · '+esc(sk.noHP):''}</div>
        ${totalK>0?`<div class="item-sub" style="margin-top:4px">Total: ${fRp(totalK)}${sisa>0?' · <strong style="color:#dc2626">Hutang: '+fRp(sisa)+'</strong>':''}</div>`:''}
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;margin-left:8px">
        <button style="background:none;border:none;font-size:18px;cursor:pointer" onclick="openEditSubkon(${i})">✏️</button>
        <button style="background:none;border:none;font-size:18px;cursor:pointer" onclick="delSubkon('${esc(sk.id)}')">🗑</button>
      </div>
    </div></div>`;
  }).join('')}`;
}
function openAddSubkon(){
  const id=padId('SK',S.masterSubkon);
  openModal(`<div class="modal-title">Tambah Subkontraktor</div>
    <div class="g2"><div class="fg"><label class="fl">ID</label><input class="fc" id="sk2-id" value="${esc(id)}" disabled></div>
    <div class="fg"><label class="fl">No HP</label><input class="fc" id="sk2-hp" type="tel" placeholder="08xx"></div></div>
    <div class="fg"><label class="fl">Nama / Tim<span class="req">*</span></label><input class="fc" id="sk2-nama" placeholder="Nama subkontraktor atau tim"></div>
    <div class="fg"><label class="fl">Spesialisasi</label><select class="fc" id="sk2-spes">${['Waterproofing','Keramik','Plafon','Cat','Listrik','Plumbing','Sipil','Besi','Interior','Lainnya'].map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Alamat / Catatan</label><input class="fc" id="sk2-alm"></div>
    <div class="act-row" style="justify-content:flex-end">
      <button class="btn btn-g" onclick="closeModal()">Batal</button>
      <button class="btn btn-p" onclick="saveSubkon(false)">💾 Simpan</button>
    </div>`);
}
function openEditSubkon(i){
  const sk=S.masterSubkon[i];
  openModal(`<div class="modal-title">Edit Subkontraktor</div>
    <input type="hidden" id="sk2-idx" value="${i}">
    <div class="g2"><div class="fg"><label class="fl">ID</label><input class="fc" id="sk2-id" value="${esc(sk.id)}" disabled></div>
    <div class="fg"><label class="fl">No HP</label><input class="fc" id="sk2-hp" type="tel" value="${esc(sk.noHP||'')}"></div></div>
    <div class="fg"><label class="fl">Nama / Tim<span class="req">*</span></label><input class="fc" id="sk2-nama" value="${esc(sk.nama)}"></div>
    <div class="fg"><label class="fl">Spesialisasi</label><select class="fc" id="sk2-spes">${['Waterproofing','Keramik','Plafon','Cat','Listrik','Plumbing','Sipil','Besi','Interior','Lainnya'].map(s=>`<option ${sk.spesialisasi===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Alamat / Catatan</label><input class="fc" id="sk2-alm" value="${esc(sk.alamat||'')}"></div>
    <div class="act-row" style="justify-content:flex-end">
      <button class="btn btn-g" onclick="closeModal()">Batal</button>
      <button class="btn btn-p" onclick="saveSubkon(true)">💾 Simpan</button>
    </div>`);
}
function saveSubkon(isEdit){
  const nama=document.getElementById('sk2-nama').value.trim();if(!nama){showToast('Nama wajib diisi','err');return;}
  const id=document.getElementById('sk2-id').value;
  const d={id,nama,spesialisasi:document.getElementById('sk2-spes').value,noHP:document.getElementById('sk2-hp').value,alamat:document.getElementById('sk2-alm').value};
  if(isEdit){const idx=Number(document.getElementById('sk2-idx').value);S.masterSubkon[idx]=d;}else S.masterSubkon.push(d);
  ss(KS.sk,S.masterSubkon);closeModal();showToast(isEdit?'✅ Subkon diperbarui':'✅ Subkon ditambahkan');go('subkon');
  doSync(isEdit?'updateSubkon':'addSubkon',d);
}
function delSubkon(id){if(!confirm('Hapus subkon '+id+'?'))return;S.masterSubkon=S.masterSubkon.filter(sk=>sk.id!==id);ss(KS.sk,S.masterSubkon);showToast('🗑 Dihapus');go('subkon');doSync('deleteSubkon',{id});}
function subkonRekap(){
  if(!S.masterSubkon.length)return '<div class="empty">Belum ada data subkontraktor</div>';
  const totalAll=S.logSubkon.reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
  const bayarAll=S.logSubkon.reduce((s,ls)=>s+(Number(ls.nominalBayar)||0),0);
  const sisaAll=totalAll-bayarAll;
  const header=totalAll>0?`<div class="card" style="margin-bottom:10px">
    <div class="sec-title" style="font-size:13px;margin-bottom:8px">Ringkasan Total</div>
    <div class="g3">
      <div class="chip"><div class="chip-lbl">Total Kontrak</div><div class="chip-val">${fRp(totalAll)}</div></div>
      <div class="chip" style="background:#f0fdf4"><div class="chip-lbl">Dibayar</div><div class="chip-val" style="color:#16a34a">${fRp(bayarAll)}</div></div>
      <div class="chip" style="background:${sisaAll>0?'#fff7ed':'#f0fdf4'}"><div class="chip-lbl">Sisa Hutang</div><div class="chip-val" style="color:${sisaAll>0?'#c2410c':'#16a34a'}">${fRp(sisaAll)}</div></div>
    </div>
  </div>`:'';
  const rows=S.masterSubkon.map(sk=>{
    const logs=S.logSubkon.filter(ls=>ls.idSubkon===sk.id);if(!logs.length)return '';
    const totalK=logs.reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
    const totalB=logs.reduce((s,ls)=>s+(Number(ls.nominalBayar)||0),0);
    const sisa=totalK-totalB;
    return `<div class="card">
      <div class="row" style="margin-bottom:10px">
        <div><div class="item-name">${esc(sk.nama)}</div><div class="item-sub">${esc(sk.spesialisasi)}</div></div>
        ${sisa>0?bdg('Belum Dibayar'):'<span class="bdg bdg-green">✓ Lunas</span>'}
      </div>
      <div class="g3" style="margin-bottom:10px">
        <div class="chip"><div class="chip-lbl">Kontrak</div><div class="chip-val">${fRp(totalK)}</div></div>
        <div class="chip" style="background:#f0fdf4"><div class="chip-lbl">Dibayar</div><div class="chip-val" style="color:#16a34a">${fRp(totalB)}</div></div>
        <div class="chip" style="background:${sisa>0?'#fff7ed':'#f0fdf4'}"><div class="chip-lbl">Sisa</div><div class="chip-val" style="color:${sisa>0?'#c2410c':'#64748b'}">${fRp(sisa)}</div></div>
      </div>
      ${logs.map(ls=>`<div class="sub-card" style="margin-bottom:6px"><div class="row">
        <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">${esc(ls.uraian)}</div><div class="item-sub">${esc(ls.namaProj||ls.kodeProj)} · ${fDate(ls.tgl)}</div></div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px"><div style="font-size:12px;font-weight:700">${fRp(ls.nilaiKontrak)}</div>${bdg(ls.statusBayar)}</div>
      </div></div>`).join('')}
    </div>`;
  }).filter(Boolean).join('');
  return header+(rows||'<div class="empty">Belum ada pekerjaan subkon dicatat</div>');
}

// ── Tab helper ─────────────────────────────────────
function setTab(page,tab){S.tab[page]=tab;go(page);}

// ── Init ───────────────────────────────────────────
window.addEventListener('DOMContentLoaded',async()=>{
  loadLocal();
  S.webAppUrl=sg(KS.url,'');S.pollInterval=Number(sg(KS.poll,60))||60;
  go('dashboard');
  document.getElementById('nav').innerHTML=buildNav();
  setTimeout(()=>{const spl=document.getElementById('spl');if(spl){spl.classList.add('out');setTimeout(()=>spl.remove(),350);}},300);
  updateSyncBadge();
  if(S.webAppUrl){await doFetch();startPoll();}
});
</script>
</body>
</html>

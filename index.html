function sbPreview(){
  const p=document.getElementById('sb-net-preview');if(!p)return;
  const cash=getNum('sb-nom')||0;const pot=getNum('sb-pot')||0;const total=cash+pot;
  p.innerHTML=total>0?`Cash <strong>${fRp(cash)}</strong>${pot?` + Potong <strong style="color:#9333ea">${fRp(pot)}</strong>`:''} = Total <strong style="color:#7c3aed">${fRp(total)}</strong>`:'';
}
function toggleKarPot(){
  const pot=getNum('sb-pot');
  const wrap=document.getElementById('kar-pot-wrap');
  if(wrap)wrap.style.display=pot>0?'block':'none';
  sbPreview();
}

function saveBayarSubkon(idx){
  const cash=getNum('sb-nom')||0;const pot=getNum('sb-pot')||0;
  const nom=cash+pot; // total settlement = cash + potongan kasbon
  const tgl=document.getElementById('sb-tgl').value;
  if(nom<=0){showToast('Masukkan nominal pembayaran atau potongan','err');return;}
  if(pot>0&&(!document.getElementById('sb-kar')||!document.getElementById('sb-kar').value)){
    showToast('Pilih karyawan yang dipotong kasbonnya','err');return;}
  const ls=S.logSubkon[idx];
  const totalBayar=(ls.nominalBayar||0)+nom;
  const sisa=ls.nilaiKontrak-totalBayar;
  const sts=sisa<=0?'Lunas':totalBayar>0?'DP':'Belum Dibayar';
  // Update logSubkon state
  S.logSubkon[idx].nominalBayar=totalBayar;
  S.logSubkon[idx].statusBayar=sts;
  S.logSubkon[idx].tglBayar=tgl;
  if(pot>0) S.logSubkon[idx].potongan=(S.logSubkon[idx].potongan||0)+pot;
  // Riwayat bayar (simpan breakdown)
  if(!S.riwayatBayarSubkon[ls.id])S.riwayatBayarSubkon[ls.id]=[];
  const riwEntry={tgl,nominal:nom};
  if(pot>0)riwEntry.potongan=pot;
  S.riwayatBayarSubkon[ls.id].push(riwEntry);
  ss(KS.rbsk,S.riwayatBayarSubkon);
  ss(KS.lsk,S.logSubkon);
  // Jika ada potongan kasbon, tambah entri POTONG ke logKasbon (client-side)
  let idKar='',namaKar='',ketPot='';
  if(pot>0){
    const sel=document.getElementById('sb-kar');
    if(sel&&sel.value){
      idKar=sel.value;
      namaKar=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text.split(' (hutang')[0]:'';
    }
    ketPot='Dipotong dari bayar subkon '+(ls.kodeProj||'');
    if(idKar){
      S.logKasbon.push({
        id:'KSB-POT-'+Date.now(),tgl,
        idKaryawan:idKar,tipe:'POTONG',nominal:pot,
        nama:namaKar,noClosing:'',ket:ketPot,kodeProj:ls.kodeProj||''
      });
      ss(KS.ksb,S.logKasbon);
    }
  }
  closeModal();
  showToast(sts==='Lunas'?'✅ Lunas! Pembayaran selesai':'✅ Pembayaran dicatat · Sisa: '+fRp(Math.max(0,sisa)));
  go('subkon');
  doSync('updateLogSubkon',{
    id:ls.id,kodeProj:ls.kodeProj,uraian:ls.uraian,
    nominalBayar:totalBayar,statusBayar:sts,tglBayar:tgl,
    potongan:pot>0?pot:0,
    idKaryawanPotong:idKar,
    namaKaryawanPotong:namaKar,
    ketPotongan:ketPot
  });
}

// Lazy-load SheetJS dari CDN (cache oleh browser setelah load pertama)
let _xlsxLoaded=false;
function _loadXlsx(){
  return new Promise((res,rej)=>{
    if(_xlsxLoaded||window.XLSX){_xlsxLoaded=true;res();return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
    s.onload=()=>{_xlsxLoaded=true;res();};
    s.onerror=()=>rej(new Error('Gagal memuat library Excel. Pastikan ada koneksi internet saat pertama kali export.'));
    document.head.appendChild(s);
  });
}
function _dlFile(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

const _ST={

  netNeg:{font:{bold:true,sz:11,color:{rgb:'B71C1C'}},numFmt:'#,##0',fill:{patternType:'solid',fgColor:{rgb:'FFEBEE'}},alignment:{horizontal:'right'}},
  pos:(e)=>({numFmt:'#,##0',font:{color:{rgb:'1B5E20'}},fill:{patternType:'solid',fgColor:{rgb:e?'DEEAF1':'FFFFFF'}},alignment:{horizontal:'right'}}),
  neg:(e)=>({numFmt:'#,##0',font:{color:{rgb:'B71C1C'}},fill:{patternType:'solid',fgColor:{rgb:e?'DEEAF1':'FFFFFF'}},alignment:{horizontal:'right'}}),
  pct:(e)=>({numFmt:'0.0',fill:{patternType:'solid',fgColor:{rgb:e?'DEEAF1':'FFFFFF'}},alignment:{horizontal:'center'}}),
  sts:(s)=>s==='Selesai'?_ST.lunas:s==='Berjalan'?_ST.jalan:s==='Hold'?_ST.hold:_ST.batal,
  tipe:(t)=>t==='BONUS'?_ST.lunas:t==='POTONG'?_ST.belum:_ST.jalan,
};
function _C(v,s){if(v===null||v===undefined)return{v:'',t:'z',s:s||{}};return{v,t:typeof v==='number'?'n':'s',s:s||{}};}
function _eRow(n){return Array.from({length:n},()=>_C(''));}
function _makeWS(rows,colW,merges){
  const ws={};
  rows.forEach((row,r)=>(row||[]).forEach((cell,c)=>{const ref=XLSX.utils.encode_cell({r,c});ws[ref]=(cell&&typeof cell==='object'&&'t'in cell)?cell:_C(cell);}));
  const lastR=rows.length-1,lastC=Math.max(0,...rows.map(r=>(r||[]).length-1));
  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:lastR,c:lastC}});
  if(colW)ws['!cols']=colW.map(w=>({wch:w}));
  if(merges)ws['!merges']=merges;
  return ws;
}

  beliRows.push(_eRow(10));
  // Group per proyek
  S.projects.forEach(p=>{
    const items=[...S.pembelian].filter(b=>b.kodeProj===p.kode&&b.status!=='ASET')
      .sort((a,b)=>String(a.tgl||'').localeCompare(String(b.tgl||'')));
    const projTotal=items.reduce((s,b)=>s+calcTotal(b),0);
    beliTotalAll+=projTotal;
    allBeliCount+=items.length;
    const projR=beliRows.length;
    // Header proyek — satu baris berwarna navy + info kanan
    const projStyle={font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',fgColor:{rgb:'1F4E79'}},alignment:{horizontal:'left',vertical:'center'}};
    const projStyleR={font:{bold:true,sz:10,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',fgColor:{rgb:'1F4E79'}},alignment:{horizontal:'right',vertical:'center'}};
    beliRows.push([
      _C(`${p.kode}  —  ${p.nama}`,projStyle),
      _C('',projStyle),_C('',projStyle),_C('',projStyle),_C('',projStyle),_C('',projStyle),_C('',projStyle),
      _C(p.jenis||'-',{font:{sz:10,color:{rgb:'CCDDEE'}},fill:{patternType:'solid',fgColor:{rgb:'1F4E79'}},alignment:{horizontal:'right'}}),
      _C(p.status,_ST.sts(p.status)),
      _C(projTotal,{...projStyleR,numFmt:'#,##0'}),
    ]);
    beliMerges.push({s:{r:projR,c:0},e:{r:projR,c:6}});
    if(!items.length){
      beliRows.push([_C('(belum ada pembelian)',{font:{italic:true,color:{rgb:'9AA5B4'}},fill:{patternType:'solid',fgColor:{rgb:'F5F7FA'}},alignment:{horizontal:'center'}}),..._eRow(9)]);
      beliMerges.push({s:{r:beliRows.length-1,c:0},e:{r:beliRows.length-1,c:9}});
    } else {
      // Header kolom
      beliRows.push(matHdr.map((h,i)=>_C(h,i>=5?_ST.hdrR:_ST.hdr)));
      // Data rows zebra
      items.forEach((b,ri)=>{
        const e=ri%2===0;
        beliRows.push([
          _C(ri+1,e?_ST.ce:_ST.co),
          _C(b.tgl||'-',e?_ST.ce:_ST.co),
          _C(b.namaBarang||'-',e?_ST.le:_ST.lo),
          _C(b.kategori||'-',e?_ST.ce:_ST.co),
          _C(b.toko||'-',e?_ST.le:_ST.lo),
          _C(fNum(b.qty),e?_ST.ne:_ST.no),
          _C(b.satuan||'-',e?_ST.ce:_ST.co),
          _C(fNum(b.harga),e?_ST.ne:_ST.no),
          _C(fNum(b.diskon),e?_ST.ne:_ST.no),
          _C(calcTotal(b),e?_ST.ne:_ST.no),
        ]);
      });
      // Subtotal proyek
      const subTotStyle={font:{bold:true,color:{rgb:'1F4E79'}},fill:{patternType:'solid',fgColor:{rgb:'DEEAF1'}},numFmt:'#,##0',alignment:{horizontal:'right'}};
      const subLblStyle={font:{bold:true,color:{rgb:'1F4E79'}},fill:{patternType:'solid',fgColor:{rgb:'DEEAF1'}},alignment:{horizontal:'right'}};
      beliRows.push([..._eRow(8),_C(`Subtotal ${items.length} item`,subLblStyle),_C(projTotal,subTotStyle)]);
    }
    beliRows.push(_eRow(10)); // spasi antar proyek
  });
  // Grand Total
  const gtStyle={font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',fgColor:{rgb:'1F4E79'}},numFmt:'#,##0',alignment:{horizontal:'right'}};
  const gtLbl={font:{bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',fgColor:{rgb:'1F4E79'}},alignment:{horizontal:'left'}};
  beliRows.push([
    _C(`GRAND TOTAL — ${allBeliCount} transaksi dari ${S.projects.length} proyek`,gtLbl),
    ..._eRow(8),_C(beliTotalAll,gtStyle),
  ]);
  beliMerges.push({s:{r:beliRows.length-1,c:0},e:{r:beliRows.length-1,c:8}});
  const wsBeli=_makeWS(beliRows,matColW,beliMerges);
  wsBeli['!rows']=[{hpt:26},{hpt:14}];

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,wsMain,'Rekap Proyek');
  XLSX.utils.book_append_sheet(wb,wsSum,'Ringkasan KPI');

  showToast('✅ Excel berhasil diunduh!');
}

// ─── EXPORT 3: Rekap Cash Flow Bulanan → Excel ────────────────────────
async function exportCashFlow(){
  showToast('Menyiapkan Excel…','info');
  try{await _loadXlsx();}catch(e){showToast(e.message,'err');return;}
  const tgl=today();
  const monthly={};
  const addM=(dt,cat,val)=>{
    if(!dt)return;
    const m=String(dt).substring(0,7);
    if(!monthly[m])monthly[m]={material:0,upah:0,subkon:0,pembayaran:0,bonus:0};
    monthly[m][cat]=(monthly[m][cat]||0)+(Number(val)||0);
  };
  S.pembelian.filter(b=>b.status!=='ASET').forEach(b=>addM(b.tgl,'material',calcTotal(b)));
  S.logAbsensi.forEach(a=>addM(a.tgl,'upah',Number(a.upahHariIni)||0));
  S.logSubkon.forEach(ls=>addM(ls.tgl,'subkon',Number(ls.nilaiKontrak)||0));
  S.logPembayaran.forEach(b=>addM(b.tgl,'pembayaran',Number(b.nominal)||0));
  S.logKasbon.filter(k=>k.tipe==='BONUS').forEach(k=>addM(k.tgl,'bonus',Number(k.nominal)||0));
  const BULAN=['','Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const months=Object.keys(monthly).sort();
  const nC=8;
  const totals={pembayaran:0,material:0,upah:0,subkon:0,bonus:0,tBiaya:0,surplus:0};
  const dataRows=months.map(m=>{
    const d=monthly[m];
    const tBiaya=d.material+d.upah+d.subkon+d.bonus;
    const surplus=d.pembayaran-tBiaya;
    totals.pembayaran+=d.pembayaran;totals.material+=d.material;
    totals.upah+=d.upah;totals.subkon+=d.subkon;totals.bonus+=d.bonus;
    totals.tBiaya+=tBiaya;totals.surplus+=surplus;
    return{m,d,tBiaya,surplus};
  });
  const cfRows=[
    [_C(`CASH FLOW BULANAN — ${S.companyName}`,_ST.title),...Array(nC-1).fill(_C('',_ST.title))],
    [_C(`Diekspor: ${tgl}  |  ${months.length} bulan`,_ST.info),...Array(nC-1).fill(_C('',_ST.info))],
    _eRow(nC),
    ['Bulan','Pendapatan / Pembayaran Masuk (Rp)','Biaya Material (Rp)','Biaya Upah (Rp)','Biaya Subkon (Rp)','Kasbon Bonus (Rp)','Total Pengeluaran (Rp)','Surplus / Defisit (Rp)'].map((h,i)=>_C(h,i===0?_ST.hdr:_ST.hdrR)),
    ...dataRows.map((r,i)=>{
      const e=i%2===0;
      const[y,mo]=r.m.split('-');
      return[
        _C(`${BULAN[parseInt(mo)]} ${y}`, e?_ST.le:_ST.lo),
        _C(fNum(r.d.pembayaran), _ST.pos(e)),
        _C(fNum(r.d.material),   e?_ST.ne:_ST.no),
        _C(fNum(r.d.upah),       e?_ST.ne:_ST.no),
        _C(fNum(r.d.subkon),     e?_ST.ne:_ST.no),
        _C(fNum(r.d.bonus),      e?_ST.ne:_ST.no),
        _C(fNum(r.tBiaya),       _ST.neg(e)),
        _C(fNum(r.surplus),      r.surplus>=0?_ST.pos(e):_ST.neg(e)),
      ];
    }),
    ...(!dataRows.length?[[_C('Belum ada data transaksi',{font:{italic:true},alignment:{horizontal:'center'}}),...Array(nC-1).fill(_C(''))]]: []),
    _eRow(nC),
    [
      _C('TOTAL',_ST.lbl),

      _C(fNum(totals.material),_ST.val),
      _C(fNum(totals.upah),_ST.val),
      _C(fNum(totals.subkon),_ST.val),
      _C(fNum(totals.bonus),_ST.val),
      _C(fNum(totals.tBiaya),_ST.netNeg),
      _C(fNum(totals.surplus),totals.surplus>=0?_ST.netPos:_ST.netNeg),
    ],
  ];
  const ws=_makeWS(cfRows,[20,30,20,18,18,18,22,22],[{s:{r:0,c:0},e:{r:0,c:nC-1}},{s:{r:1,c:0},e:{r:1,c:nC-1}}]);
  ws['!rows']=[{hpt:24},{hpt:14},{hpt:6},{hpt:20}];
  const wb=XLSX.utils.book_new();

  _dlFile(new Blob([buf],{type:'application/octet-stream'}),`${S.companyName}_CashFlow_${tgl}.xlsx`);

}

// ─── Export Master Barang & Toko (untuk RAB) ─────────────────────────
async function exportMasterData(){
  showToast('Menyiapkan Excel Master Data…','info');
  try{await _loadXlsx();}catch(e){showToast(e.message,'err');return;}
  const tgl=today();

  // ── Sheet 1: Master Barang ──────────────────────────────────────────
  const nB=5;
  const barangRows=[
    [_C(`MASTER BARANG — ${S.companyName}`,_ST.title),...Array(nB-1).fill(_C('',_ST.title))],
    [_C(`Diekspor: ${tgl}  |  ${S.masterBarang.length} item`,_ST.info),...Array(nB-1).fill(_C('',_ST.info))],
    _eRow(nB),
    ['No','Nama Barang / Material','Kategori','Satuan','Harga Satuan Terakhir (Rp)'].map((h,i)=>_C(h,i===4?_ST.hdrR:_ST.hdr)),
  ];
  // Sort by kategori, lalu nama
  const sortedBarang=[...S.masterBarang].sort((a,b)=>{
    const kc=String(a.kategori||'').localeCompare(String(b.kategori||''));
    return kc!==0?kc:String(a.nama||'').localeCompare(String(b.nama||''));
  });
  let lastKat='', no=0;
  sortedBarang.forEach((b,i)=>{
    const kat=String(b.kategori||'—');
    // Baris pemisah kategori
    if(kat!==lastKat){
      if(lastKat!=='') barangRows.push(_eRow(nB));
      barangRows.push([
        _C(kat,{font:{bold:true,color:{rgb:'1F4E79'}},fill:{fgColor:{rgb:'DEEAF1'}},alignment:{horizontal:'left'}}),
        ...(Array(nB-1).fill(_C('',{fill:{fgColor:{rgb:'DEEAF1'}}}))),
      ]);
      lastKat=kat; no=0;
    }
    no++;
    const e=no%2===0;
    barangRows.push([
      _C(no,        e?{...(_ST.le),alignment:{horizontal:'center'}}:{...(_ST.lo),alignment:{horizontal:'center'}}),
      _C(b.nama||'',e?_ST.le:_ST.lo),
      _C(kat,       e?_ST.le:_ST.lo),
      _C(b.satuan||'pcs', e?{...(_ST.le),alignment:{horizontal:'center'}}:{...(_ST.lo),alignment:{horizontal:'center'}}),
      _C(b.hargaTerakhir>0?fNum(b.hargaTerakhir):'—', b.hargaTerakhir>0?(e?_ST.pos(true):_ST.pos(false)):(e?_ST.le:_ST.lo)),
    ]);
  });
  if(!sortedBarang.length) barangRows.push([_C('Belum ada data barang',{font:{italic:true},alignment:{horizontal:'center'}}),...Array(nB-1).fill(_C(''))]);
  const wsBarang=_makeWS(barangRows,[6,40,20,12,26],[
    {s:{r:0,c:0},e:{r:0,c:nB-1}},
    {s:{r:1,c:0},e:{r:1,c:nB-1}},
  ]);
  wsBarang['!rows']=[{hpt:24},{hpt:14},{hpt:6},{hpt:20}];

  // ── Sheet 2: Master Toko ───────────────────────────────────────────
  const nT=3;
  const sortedToko=[...S.masterToko].sort((a,b)=>String(a).localeCompare(String(b)));
  const tokoRows=[
    [_C(`MASTER TOKO / SUPPLIER — ${S.companyName}`,_ST.title),...Array(nT-1).fill(_C('',_ST.title))],
    [_C(`Diekspor: ${tgl}  |  ${sortedToko.length} toko`,_ST.info),...Array(nT-1).fill(_C('',_ST.info))],
    _eRow(nT),
    ['No','Nama Toko / Supplier','Keterangan'].map(h=>_C(h,_ST.hdr)),
    ...sortedToko.map((t,i)=>{
      const e=i%2===0;
      return[
        _C(i+1,{...(e?_ST.le:_ST.lo),alignment:{horizontal:'center'}}),
        _C(t,   e?_ST.le:_ST.lo),
        _C('',  e?_ST.le:_ST.lo),
      ];
    }),
  ];
  if(!sortedToko.length) tokoRows.push([_C('Belum ada data toko',{font:{italic:true},alignment:{horizontal:'center'}}),...Array(nT-1).fill(_C(''))]);
  const wsToko=_makeWS(tokoRows,[6,40,30],[
    {s:{r:0,c:0},e:{r:0,c:nT-1}},
    {s:{r:1,c:0},e:{r:1,c:nT-1}},
  ]);
  wsToko['!rows']=[{hpt:24},{hpt:14},{hpt:6},{hpt:20}];

  // ── Sheet 3: Ringkasan Harga per Kategori ─────────────────────────
  // Rata-rata harga per kategori — berguna untuk estimasi RAB
  const nR=4;
  const katMap={};
  sortedBarang.forEach(b=>{
    if(!b.hargaTerakhir) return;
    const k=String(b.kategori||'Lain-lain');
    if(!katMap[k]) katMap[k]={items:[],total:0};
    katMap[k].items.push(b);
    katMap[k].total+=b.hargaTerakhir;
  });
  const ringkasanRows=[
    [_C(`RINGKASAN HARGA PER KATEGORI — ${S.companyName}`,_ST.title),...Array(nR-1).fill(_C('',_ST.title))],
    [_C(`Diekspor: ${tgl}  |  Rata-rata harga terakhir per kategori`,_ST.info),...Array(nR-1).fill(_C('',_ST.info))],
    _eRow(nR),
    ['Kategori','Jumlah Item','Harga Terendah (Rp)','Harga Rata-rata (Rp)'].map((h,i)=>_C(h,i>1?_ST.hdrR:_ST.hdr)),
  ];
  Object.keys(katMap).sort().forEach((k,i)=>{
    const d=katMap[k];
    const prices=d.items.map(b=>b.hargaTerakhir).filter(v=>v>0).sort((a,b)=>a-b);
    const avg=Math.round(d.total/d.items.length);
    const e=i%2===0;
    ringkasanRows.push([
      _C(k,                   e?_ST.le:_ST.lo),
      _C(d.items.length,      {...(e?_ST.le:_ST.lo),alignment:{horizontal:'center'}}),
      _C(prices.length?fNum(prices[0]):'—', e?_ST.le:_ST.lo),
      _C(fNum(avg),           _ST.pos(e)),
    ]);
  });
  if(!Object.keys(katMap).length) ringkasanRows.push([_C('Belum ada data harga',{font:{italic:true}}),...Array(nR-1).fill(_C(''))]);
  const wsRingkasan=_makeWS(ringkasanRows,[28,14,24,24],[
    {s:{r:0,c:0},e:{r:0,c:nR-1}},
    {s:{r:1,c:0},e:{r:1,c:nR-1}},
  ]);
  wsRingkasan['!rows']=[{hpt:24},{hpt:14},{hpt:6},{hpt:20}];

  // ── Build workbook ─────────────────────────────────────────────────
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,wsBarang,'Master Barang');
  XLSX.utils.book_append_sheet(wb,wsToko,'Master Toko');
  XLSX.utils.book_append_sheet(wb,wsRingkasan,'Ringkasan Harga');
  const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'});
  _dlFile(new Blob([buf],{type:'application/octet-stream'}),`${S.companyName}_MasterData_${tgl}.xlsx`);
  showToast('✅ Master Data berhasil diunduh!');
}

function printAllProyek(){

    const upah=S.logAbsensi.filter(a=>a.kodeProj===p.kode).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
    const subkon=S.logSubkon.filter(ls=>ls.kodeProj===p.kode).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
    const kb=calcKasbonForProj(p.kode);
    const tBiaya=mat+upah+subkon+kb.bonus;
    const laba=vs.final-tBiaya;
    const bayar=S.logPembayaran.filter(b=>b.kodeProj===p.kode).reduce((s,b)=>s+(Number(b.nominal)||0),0);
    return{p,vs,mat,upah,subkon,kb,tBiaya,laba,bayar};

// ─── PRINT 2: Rekap Detail Satu Proyek → PDF ──────────────────────────
function printRekapProyek(kode){
  if(!kode){showToast('Pilih proyek terlebih dahulu','err');return;}
  const p=S.projects.find(x=>x.kode===kode);
  if(!p){showToast('Proyek tidak ditemukan','err');return;}
  const vs=vSum(p);
  const mat=S.pembelian.filter(b=>b.kodeProj===kode&&b.status!=='ASET').reduce((s,b)=>s+calcTotal(b),0);
  const upah=S.logAbsensi.filter(a=>a.kodeProj===kode).reduce((s,a)=>s+(Number(a.upahHariIni)||0),0);
  const subkon=S.logSubkon.filter(ls=>ls.kodeProj===kode).reduce((s,ls)=>s+(Number(ls.nilaiKontrak)||0),0);
  const kb=calcKasbonForProj(kode);
  const totalBiaya=mat+upah+subkon+kb.bonus;
  const laba=vs.final-totalBiaya;
  const margin=vs.final?(laba/vs.final*100).toFixed(1):0;
  const bayar=S.logPembayaran.filter(b=>b.kodeProj===kode).reduce((s,b)=>s+(Number(b.nominal)||0),0);
  const piutang=vs.final-bayar;
  const rabProj=S.rab.find(r=>r.kodeProj===kode);
  const rabTotal=rabProj?(fNum(rabProj.material)+fNum(rabProj.upah)+fNum(rabProj.subkon)+fNum(rabProj.overhead)):0;
  const bayarLog=[...S.logPembayaran].filter(b=>b.kodeProj===kode).sort((a,b)=>String(b.tgl||'').localeCompare(String(a.tgl||'')));
  const varRows=p.variasi||[];
  const progColor=(p.progress||0)>=75?'#2E7D32':(p.progress||0)>=50?'#E65100':'#C62828';
  const stBdg=(s)=>({Berjalan:'bdg bdg-blue',Selesai:'bdg bdg-green',Hold:'bdg bdg-brown',Batal:'bdg bdg-red'}[s]||'bdg');
  // Pembelian accordion grouped by kategori
  const beliData=[...S.pembelian].filter(b=>b.kodeProj===kode&&b.status!=='ASET').sort((a,b)=>String(b.tgl||'').localeCompare(String(a.tgl||'')));
  const beliByKat={};
  beliData.forEach(b=>{const k=b.kategori||'Lainnya';if(!beliByKat[k])beliByKat[k]=[];beliByKat[k].push(b);});
  // Absensi per karyawan summary
  const absData=S.logAbsensi.filter(a=>a.kodeProj===kode);
  const absMap={};absData.forEach(a=>{const n=a.nama||a.idKaryawan||'?';if(!absMap[n])absMap[n]={hadir:0,upah:0};absMap[n].hadir+=(a.status==='Hadir'?1:0);absMap[n].upah+=(Number(a.upahHariIni)||0);});
  const html=`
    <div class="rpt-header">
      <div class="rpt-title">${esc(S.companyName)}</div>
      <div class="rpt-sub">Rekap Proyek — ${esc(p.nama)}</div>
      <div class="rpt-date">Dicetak: ${fDate(today())}</div>
    </div>
    <div class="cards">
      <div class="card ${laba>=0?'pos':'neg'}"><div class="cl">Laba / Rugi</div><div class="cv">${fRp(laba)}</div><div class="cs">Margin ${margin}%</div></div>
      <div class="card info"><div class="cl">Nilai Kontrak Final</div><div class="cv">${fRp(vs.final)}</div><div class="cs">Awal: ${fRp(p.nilaiKontrak)}</div></div>
      <div class="card"><div class="cl">Total Biaya</div><div class="cv">${fRp(totalBiaya)}</div><div class="cs">${rabTotal?'RAB: '+fRp(rabTotal):'Belum ada RAB'}</div></div>
      <div class="card ${piutang>0?'warn':'pos'}"><div class="cl">Piutang</div><div class="cv">${fRp(piutang)}</div><div class="cs">Diterima: ${fRp(bayar)}</div></div>
    </div>
    <div class="gr2">
      <div class="panel">
        <h2>RAB vs Realisasi <span>${rabTotal?'per komponen':'belum ada RAB'}</span></h2>
        <div class="chart-wrap"><canvas id="rabChart"></canvas></div>
      </div>
      <div class="panel">
        <h2>Komposisi Biaya Realisasi</h2>
        <div class="chart-wrap"><canvas id="compChart"></canvas></div>
      </div>
    </div>
    <div class="panel">
      <h2>Informasi Proyek</h2>
      <table class="info-tbl">
        <tr><td class="info-lbl">Kode Proyek</td><td>${esc(p.kode)}</td><td class="info-lbl">Status</td><td><span class="${stBdg(p.status)}">${esc(p.status)}</span></td></tr>
        <tr><td class="info-lbl">Jenis</td><td>${esc(p.jenis||'-')}</td><td class="info-lbl">Tanggal Mulai</td><td>${fDate(p.tglMulai)}</td></tr>
        <tr><td class="info-lbl">Progress</td><td colspan="3">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;background:#e5e7eb;border-radius:4px;height:8px;max-width:200px"><div style="background:${progColor};width:${p.progress||0}%;height:100%;border-radius:4px"></div></div>
            <strong style="color:${progColor}">${p.progress||0}%</strong>
          </div>
        </td></tr>
        ${p.catatan?`<tr><td class="info-lbl">Catatan</td><td colspan="3">${esc(p.catatan)}</td></tr>`:''}
      </table>
    </div>
    <div class="panel">
      <h2>Rincian RAB vs Realisasi</h2>
      <table>
        <thead><tr><th>Komponen</th><th class="r">Anggaran RAB (Rp)</th><th class="r">Realisasi (Rp)</th><th class="r">Selisih (Rp)</th></tr></thead>
        <tbody>
          <tr><td>Nilai Kontrak</td><td class="r">${fRp(p.nilaiKontrak)}</td><td class="r">${fRp(vs.final)}</td><td class="r" style="color:${vs.final>=p.nilaiKontrak?'#1B5E20':'#C62828'}">${fRp(vs.final-p.nilaiKontrak)}</td></tr>
          <tr><td>— ${esc(rabProj?.labelMat||'Material')}</td><td class="r">${fRp(rabProj?.material||0)}</td><td class="r">${fRp(mat)}</td><td class="r" style="color:${mat<=(rabProj?.material||Infinity)?'#1B5E20':'#C62828'}">${fRp(mat-(rabProj?.material||0))}</td></tr>
          <tr><td>— ${esc(rabProj?.labelUpah||'Upah')}</td><td class="r">${fRp(rabProj?.upah||0)}</td><td class="r">${fRp(upah)}</td><td class="r" style="color:${upah<=(rabProj?.upah||Infinity)?'#1B5E20':'#C62828'}">${fRp(upah-(rabProj?.upah||0))}</td></tr>
          <tr><td>— ${esc(rabProj?.labelSubkon||'Subkon')}</td><td class="r">${fRp(rabProj?.subkon||0)}</td><td class="r">${fRp(subkon)}</td><td class="r" style="color:${subkon<=(rabProj?.subkon||Infinity)?'#1B5E20':'#C62828'}">${fRp(subkon-(rabProj?.subkon||0))}</td></tr>
          <tr><td>— ${esc(rabProj?.labelOverhead||'Overhead')}</td><td class="r">${fRp(rabProj?.overhead||0)}</td><td class="r">—</td><td class="r">—</td></tr>
          <tr><td>— Kasbon Bonus</td><td class="r">—</td><td class="r">${fRp(kb.bonus)}</td><td class="r">—</td></tr>
        </tbody>
        <tfoot>
          <tr><td><strong>Total Biaya</strong></td><td class="r"><strong>${fRp(rabTotal)}</strong></td><td class="r"><strong>${fRp(totalBiaya)}</strong></td><td class="r" style="color:${totalBiaya<=rabTotal||!rabTotal?'#1B5E20':'#C62828'}"><strong>${fRp(totalBiaya-rabTotal)}</strong></td></tr>
          <tr><td><strong>Laba / Rugi</strong></td><td class="r">—</td><td class="r" style="color:${laba>=0?'#1B5E20':'#C62828'}"><strong>${fRp(laba)}</strong></td><td class="r"><strong>${margin}%</strong></td></tr>
        </tfoot>
      </table>
    </div>
    <div class="gr2">
      <div class="panel">
        <h2>Pembayaran Masuk <span>${bayarLog.length} termin</span></h2>
        <table>
          <thead><tr><th>Tanggal</th><th>Metode</th><th class="r">Nominal (Rp)</th></tr></thead>
          <tbody>${bayarLog.length?bayarLog.map(b=>`<tr><td>${fDate(b.tgl)}</td><td>${esc(b.metode||'-')}</td><td class="r">${fRp(b.nominal)}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:#94a3b8;font-style:italic">Belum ada pembayaran</td></tr>'}</tbody>
          <tfoot>
            <tr><td colspan="2"><strong>Total Diterima</strong></td><td class="r"><strong>${fRp(bayar)}</strong></td></tr>
            <tr><td colspan="2">Piutang</td><td class="r" style="color:${piutang>0?'#C62828':'#1B5E20'}"><strong>${fRp(piutang)}</strong></td></tr>
          </tfoot>
        </table>
      </div>
      ${varRows.length?`<div class="panel">
        <h2>Variasi Kerja Tambah / Kurang <span>${varRows.length} item</span></h2>
        <table>
          <thead><tr><th>Tanggal</th><th>Jenis</th><th class="r">Nominal (Rp)</th></tr></thead>
          <tbody>${varRows.map(v=>`<tr><td>${fDate(v.tgl)}</td><td><span class="bdg ${v.jenis==='tambah'?'bdg-green':'bdg-red'}">${v.jenis==='tambah'?'Tambah':'Kurang'}</span></td><td class="r">${fRp(v.nominal)}</td></tr>`).join('')}</tbody>
          <tfoot><tr><td colspan="2"><strong>Net Variasi</strong></td><td class="r" style="color:${vs.tambah-vs.kurang>=0?'#1B5E20':'#C62828'}"><strong>${fRp(vs.tambah-vs.kurang)}</strong></td></tr></tfoot>
        </table>
      </div>`:`<div class="panel">
        <h2>Ringkasan Upah per Karyawan</h2>
        <table>
          <thead><tr><th>Nama Karyawan</th><th class="c">Hari Hadir</th><th class="r">Total Upah (Rp)</th></tr></thead>
          <tbody>${Object.entries(absMap).length?Object.entries(absMap).sort((a,b)=>b[1].upah-a[1].upah).map(([n,v],i)=>`<tr><td>${esc(n)}</td><td class="c">${v.hadir}</td><td class="r">${fRp(v.upah)}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:#94a3b8;font-style:italic">Belum ada data</td></tr>'}</tbody>
          <tfoot><tr><td><strong>Total</strong></td><td class="c"><strong>${Object.values(absMap).reduce((s,v)=>s+v.hadir,0)}</strong></td><td class="r"><strong>${fRp(upah)}</strong></td></tr></tfoot>
        </table>
      </div>`}
    </div>
    <div class="panel">
      <h2>Log Pembelian Material <span>${beliData.length} item · ${fRp(mat)}</span></h2>
      <table>
        <thead><tr><th>Kategori / Nama Barang</th><th>Toko</th><th class="c">Qty</th><th class="r">Total (Rp)</th></tr></thead>
        <tbody>${Object.entries(beliByKat).map(([kat,items])=>{
          const tKat=items.reduce((s,b)=>s+calcTotal(b),0);
          return `<tr class="acc-row"><td><strong>${esc(kat)}</strong></td><td>—</td><td class="c">${items.length} item</td><td class="r"><strong>${fRp(tKat)}</strong></td></tr>
          <tr class="detail-row"><td colspan="4"><div class="detail-inner"><table>
            <thead><tr><th>Tanggal</th><th>Nama Barang</th><th>Toko</th><th class="r">Qty</th><th class="r">Total (Rp)</th></tr></thead>
            <tbody>${items.map(b=>`<tr><td>${fDate(b.tgl)}</td><td>${esc(b.namaBarang)}</td><td>${esc(b.toko||'-')}</td><td class="r">${fNum(b.qty)} ${b.satuan||''}</td><td class="r">${fRp(calcTotal(b))}</td></tr>`).join('')}</tbody>
          </table></div></td></tr>`;}).join('')}
        ${!beliData.length?'<tr><td colspan="4" style="text-align:center;color:#94a3b8;font-style:italic">Belum ada pembelian</td></tr>':''}
        </tbody>
        <tfoot><tr><td colspan="3"><strong>TOTAL MATERIAL</strong></td><td class="r"><strong>${fRp(mat)}</strong></td></tr></tfoot>
      </table>
      <div style="margin-top:8px;font-size:10px;color:#94a3b8">💡 Klik kategori untuk melihat detail item</div>
    </div>`;
  const rabLabels=JSON.stringify([rabProj?.labelMat||'Material',rabProj?.labelUpah||'Upah',rabProj?.labelSubkon||'Subkon',rabProj?.labelOverhead||'Overhead','Kasbon Bonus']);
  const rabAnggaran=JSON.stringify([fNum(rabProj?.material),fNum(rabProj?.upah),fNum(rabProj?.subkon),fNum(rabProj?.overhead),0]);

  const chartScripts=`
    new Chart(document.getElementById('rabChart'),{type:'bar',data:{labels:${rabLabels},datasets:[
      {label:'Anggaran RAB (ribu Rp)',data:${rabAnggaran}.map(v=>Math.round(v/1000)),backgroundColor:'rgba(46,117,182,.65)',borderRadius:4},
      {label:'Realisasi (ribu Rp)',data:${rabRealisasi},backgroundColor:'rgba(198,40,40,.65)',borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{y:{ticks:{font:{size:10}}}}}});
    new Chart(document.getElementById('compChart'),{type:'doughnut',data:{labels:['Material','Upah','Subkon','Kasbon Bonus'],datasets:[{data:[${Math.round(mat/1000)},${Math.round(upah/1000)},${Math.round(subkon/1000)},${Math.round(kb.bonus/1000)}],backgroundColor:['#1F4E79','#2E75B6','#ED7D31','#F4B942']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}},tooltip:{callbacks:{label:ctx=>ctx.label+': Rp '+(ctx.parsed*1000).toLocaleString('id-ID')}}}}}}});
